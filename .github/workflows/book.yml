name: Deploy Book

# Restored 2026-05-18 after the user re-enabled GitHub Actions +
# GitHub Pages (was removed in 3ded2e3 "until GitHub Pro"). This is
# the current Pages-via-Actions pattern (upload-pages-artifact +
# deploy-pages + the github-pages environment) — no gh-pages branch.
# The book is pure mdBook markdown, so this job needs neither cargo
# nor the private subs/pgen submodule.

on:
  push:
    branches:
      - main
    paths:
      - 'book/**'
      - '.github/workflows/book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Examples are verified before deploy (next steps), which
          # needs rgx-core to build → the pgen submodule.
          submodules: recursive
          token: ${{ secrets.RGX_SUBMODULES_TOKEN != '' && secrets.RGX_SUBMODULES_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblua5.4-dev libpcre2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Keep in lockstep with Cargo.toml rust-version / ci.yml.
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap PGEN generated parser
        # Fresh checkout lacks subs/pgen/generated/* (slice-5 pivot).
        # Required before any cargo build. See ci.yml / README.
        run: make -C subs/pgen/rust SHELL=/bin/bash regex_parser_bootstrap

      - name: Verify book examples (book MUST NOT deploy if any break)
        # User requirement 2026-05-18: "if any example code does not
        # compile and execute cleanly the book must not build." The
        # book chapters are wired into rgx-core as doctests
        # (rgx-core/src/book_doctests.rs); this compiles+RUNS every
        # non-`ignore` block of every wired chapter exactly as a user
        # pasting it would. A failure here fails this job, so the
        # `deploy` job (needs: build) never runs and Pages is not
        # updated with broken examples.
        run: cargo test -p rgx-core --doc

      - name: Install mdBook
        # Pinned to the version validated locally against the current
        # book sources (`mdbook build book`, 2026-05-18). Bump in
        # lockstep with the mdBook devs use locally so CI and local
        # builds never diverge.
        run: |
          mkdir -p $HOME/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build book
        run: mdbook build book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
