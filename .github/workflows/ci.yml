name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workspace:
    name: Workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.RGX_SUBMODULES_TOKEN != '' && secrets.RGX_SUBMODULES_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblua5.4-dev libpcre2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to the declared MSRV (Cargo.toml rust-version). Must
          # stay >= rust-version or cargo hard-errors before any test
          # runs — a 1.88.0 pin against MSRV 1.95 silently broke CI and
          # let the deep-nesting gate failure through (see CHANGES.md
          # 2026-05-18). Bump in lockstep with Cargo.toml rust-version.
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap PGEN generated parser
        # PGEN no longer ships generated parsers (slice-5 pivot, pgen
        # 0ed2b2ad). A fresh checkout lacks subs/pgen/generated/*, so
        # pgen's include!() fails and nothing compiles — this was the
        # cause of red CI on main. Idempotent cold-clone bootstrap (no
        # Perl). See README "Build note" / project_pgen_generated_files.
        run: make -C subs/pgen/rust SHELL=/bin/bash regex_parser_bootstrap

      - name: Run local CI script
        run: ./scripts/run-local-ci.sh

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on pushes to main (not PRs) to avoid noisy CI.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.RGX_SUBMODULES_TOKEN != '' && secrets.RGX_SUBMODULES_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblua5.4-dev libpcre2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to the declared MSRV (Cargo.toml rust-version). Must
          # stay >= rust-version or cargo hard-errors before any test
          # runs — a 1.88.0 pin against MSRV 1.95 silently broke CI and
          # let the deep-nesting gate failure through (see CHANGES.md
          # 2026-05-18). Bump in lockstep with Cargo.toml rust-version.
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap PGEN generated parser
        # See the workspace job's step — required before any cargo
        # build on a fresh checkout (this job does not run
        # run-local-ci.sh, so it needs its own bootstrap).
        run: make -C subs/pgen/rust SHELL=/bin/bash regex_parser_bootstrap

      - name: Run criterion benchmarks
        run: |
          cargo bench -p rgx-bench --bench throughput -- --output-format bencher 2>/dev/null | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.txt
          retention-days: 90

  benchmark-regression-check:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Runs on PRs (and pushes) so silent perf regressions are caught
    # before merge. The check compares the rgx-vs-PCRE2 ratio for
    # each headline pattern against the checked-in baseline
    # (`rgx-bench/baselines/main.toml`) with a 20% tolerance — wide
    # enough to absorb GHA runner noise but tight enough to flag the
    # kind of regression that would have hidden the 3.7× email_basic
    # gap before today's DFA `\b` work. Update the baseline in the
    # same commit as any intentional perf change.
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.RGX_SUBMODULES_TOKEN != '' && secrets.RGX_SUBMODULES_TOKEN || github.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblua5.4-dev libpcre2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Pin to the declared MSRV (Cargo.toml rust-version). Must
          # stay >= rust-version or cargo hard-errors before any test
          # runs — a 1.88.0 pin against MSRV 1.95 silently broke CI and
          # let the deep-nesting gate failure through (see CHANGES.md
          # 2026-05-18). Bump in lockstep with Cargo.toml rust-version.
          toolchain: 1.95.0

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Bootstrap PGEN generated parser
        # See the workspace job's step — required before any cargo
        # build on a fresh checkout (this job does not run
        # run-local-ci.sh, so it needs its own bootstrap).
        run: make -C subs/pgen/rust SHELL=/bin/bash regex_parser_bootstrap

      - name: Run rgx-vs-PCRE2 regression check
        run: |
          cargo run --release -p rgx-bench --bin regression_check 2>&1 | tee regression-check-results.md

      - name: Upload regression check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-check-${{ github.sha }}
          path: regression-check-results.md
          retention-days: 30
