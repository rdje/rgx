# cbindgen configuration for rgx-capi.
#
# Run via the crate's `build.rs` at compile time; can also be invoked
# manually:  `cbindgen --config cbindgen.toml --crate rgx-capi --output include/rgx.h`
#
# See https://github.com/mozilla/cbindgen/blob/master/docs.md

language = "C"
pragma_once = true
include_version = true
include_guard = "RGX_H"
documentation = true
documentation_style = "doxy"

# Sort exports for stable diffs across regenerations.
sort_by = "Name"

# Header comment block. Pinned to the project, version, and ABI
# stability note. Update when bumping the major version.
header = """\
/*
 * rgx — high-performance, programmable regex engine.
 *
 * This header is auto-generated by cbindgen from rgx-capi/src/lib.rs.
 * Do not edit by hand. Regenerate via `cargo build -p rgx-capi`.
 *
 * ABI stability: function signatures, error codes, and `#[repr(C)]`
 * struct layouts are stable within a major version. Opaque pointer
 * internals are not — never depend on the size or layout of any
 * `Rgx*` type.
 *
 * See docs/A9_LANGUAGE_BINDINGS_DESIGN.md for the full design.
 */
"""

# Trailer comment block.
trailer = """\
/* End of generated rgx.h */
"""

[parse]
# rgx-capi has no inner modules that need parsing; the public surface
# is all in src/lib.rs.
parse_deps = false

[export]
# Surface everything declared `pub extern "C"` and every `pub const`
# error code / version constant.
include = ["RGX_OK", "RGX_ERR_NULL_POINTER", "RGX_ERR_INVALID_PATTERN",
           "RGX_ERR_INVALID_UTF8", "RGX_ERR_LIMIT_EXCEEDED",
           "RGX_ERR_INVALID_HANDLE", "RGX_ERR_INTERNAL"]

# Opaque types: declared in the header as forward `typedef struct
# RgxRegex RgxRegex;` so the C side can hold pointers without
# knowing the layout.
[export.rename]
"RgxRegex" = "RgxRegex"

[fn]
# Group functions by their leading comment block so the header is
# easy to scan. cbindgen preserves source order; we keep lib.rs
# organised by surface (diagnostics, lifecycle, matching).
prefix = ""
postfix = ""
args = "auto"
rename_args = "None"

[enum]
# Error codes are `pub const i32` (not Rust enums), so this section
# is unused but kept for future Rust enums.
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
