upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0034/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0034/pgen_trace.log
  pattern: "(?(*pla:foo).{6}|a..)"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` block #1357 starting
    near input line 6387. PCRE2 10.47 accepts and matches
    this pattern in its own pcre2test harness; PGEN's regex
    grammar diverges as recorded under `actual_behavior`.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept the pattern. PCRE2 10.47 parses it as a valid regex; the corresponding case in `subs/pcre2/testdata/testinput1` (line 6387) expects a successful match.

actual_behavior: |
  RGX `Regex::compile("(?(*pla:foo).{6}|a..)")` returns:
        regex compile error: E_PARSE_FAILURE: generated regex parse failed: Parser did not consume full input at position 0

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0034/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0034/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0034/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  One of many PGEN-related failures uncovered by RGX's
  PCRE2 10.47 testinput1 conformance harness. Each failing pattern
  also blocks RGX from passing the corresponding pcre2test case.
  Aggregate impact is tracked in `docs/BACKLOG.md` C7.

resolution:
  status: fixed-upstream-pending-adapter
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.19"
  fixed_in_parser_backend_version: "edd3b59"
  verified_at: 2026-04-14T00:00:00Z
  verification_notes: |
    PGEN 1.1.19 (commit edd3b59) now parses the repro input —
    the input no longer fails at PGEN. The remaining failure is
    RGX-side: PGEN emits an AST node of category "condition assertion (callout-style lookaround aliases)"
    that RGX's adapter in rgx-core/src/parsing.rs does not yet
    lower. Observed RGX-side error:
      pgen AST contract mismatch: unsupported pgen condition assertion '*pla:foo'
    Tracked as RGX-side follow-up in docs/BACKLOG.md C7 under
    "RGX adapter gaps opened by PGEN 1.1.19 upstream fixes".

