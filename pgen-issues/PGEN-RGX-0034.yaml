id: PGEN-RGX-0034
summary: |
  PGEN regex parser rejects pattern "(?(*pla:foo).{6}|a..)" that PCRE2 10.47 accepts.
status: closed
opened_at: 2026-04-13T00:00:00Z
first_seen_at: 2026-04-13T00:00:00Z
last_updated_at: 2026-04-13T00:00:00Z

