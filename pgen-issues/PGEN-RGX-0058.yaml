id: PGEN-RGX-0058
summary: |
  PGEN regex parser rejects variable-length lookbehinds that contain PCRE2 control verbs like (*ACCEPT), (*COMMIT), (*FAIL), (*PRUNE), (*SKIP), (*THEN), (*:MARK). PCRE2 10.47 accepts these — the control verb short-circuits match-time backtracking, and pcre2pattern(3) documents lookbehind variable-length support in modern PCRE2.
status: closed
opened_at: 2026-04-15T00:00:00Z
first_seen_at: 2026-04-15T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

