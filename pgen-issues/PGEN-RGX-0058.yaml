  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0058/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0058/pgen_trace.log
  pattern: "(?<=a(*ACCEPT)b)c"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` line 8214 and neighbouring
    lines. PCRE2 10.47 accepts and matches every variant. pcre2pattern(3)
    §"Assertions" documents variable-length lookbehind support in
    modern PCRE2 (10.42+) and notes that control verbs `(*ACCEPT)`,
    `(*FAIL)`, `(*COMMIT)`, `(*PRUNE)`, `(*SKIP)`, `(*THEN)`, and
    name-marked `(*:MARK)` compose with lookbehinds. Affects ~49
    test cases.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept variable-length lookbehinds, at minimum for
  the seven PCRE2 control verbs that short-circuit backtracking
  (`(*ACCEPT)`, `(*FAIL)`, `(*COMMIT)`, `(*PRUNE)`, `(*SKIP)`,
  `(*THEN)`, `(*:MARK)`). The current restriction on
  `lookaround_body` (or equivalent) to fixed-length content is
  stricter than pcre2pattern(3) documents for PCRE2 10.42+.

  Suggested relaxation in `subs/pgen/grammars/regex.ebnf`:
  drop the fixed-length pre-validation of lookbehind bodies at
  parse time; let the compilation / matching phase enforce any
  length bounds (PCRE2 itself uses a numeric depth-limit default
  configurable via `PCRE2_EXTRA_MATCH_WORD_NOT_ANCHORED`-style
  flags, not a grammar-level rejection).

actual_behavior: |
  PGEN rejects the pattern with a hard parse failure:
        regex compile error: E_PARSE_FAILURE: variable-length lookbehind is not accepted by the regex compile contract
        (?<=a(*ACCEPT)b)c

  This rejection fires even for lookbehinds that are effectively
  fixed-length once the `(*ACCEPT)` verb's short-circuit semantics
  are applied. All 49 affected patterns would compile cleanly in
  PCRE2 10.47.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0058/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0058/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0058/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  ~49 test cases across testinput1 depend on variable-length
  lookbehinds. Representative patterns (deduplicated):
    (?<=a(*ACCEPT)b)c
    (?<=(a(*ACCEPT)b))c
    (?<=(a(*COMMIT)b))c
    (?<!a(*FAIL)b)c
    (?<=a(*:N)b)c
    (?<=a(*PRUNE)b)c
    (?<=a(*SKIP)b)c
    (?<=a(*THEN)b)c
  Each is currently an E_PARSE_FAILURE; with the grammar
  relaxation, all should parse and then match equivalently to
  PCRE2 10.47. No RGX-side adapter work expected — the VM
  already handles these constructs when the atom/group AST is
  produced.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.23"
  fixed_in_parser_backend_version: "cd0f8c7"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.23 (commit cd0f8c7, "Publish regex PCRE2 maintenance
    release 1.1.23") accepts bounded variable-length lookbehind
    and PCRE2 control verbs inside lookbehind, while keeping
    unbounded quantifiers (`+`, `*`, `{n,}`) rejected.
    Release notes explicitly cite this report.

    Verified against the updated submodule:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '(?<=a(*ACCEPT)b)c' /tmp/verify.json
    emits `"status": "success"` — PGEN parses the repro cleanly.

    No RGX adapter wiring required; the VM already handles the
    resulting lookbehind/verb AST shapes.
