  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` block #0 starting
    near input line 1285. PCRE2 10.47 accepts and matches this pattern in its own pcre2test harness; PGEN's regex grammar diverges as recorded under `actual_behavior`.

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  **Family fix request.** pcre2pattern(3) §"Generic character types" enumerates the escape forms that produce a Unicode codepoint and are therefore valid `class_range` endpoints:

    * `\NNN`   — bare octal, 1 to 3 digits following `\` (no brace)
    * `\o{N}`  — braced octal, 1+ digits
    * `\xNN`   — 1-byte hex, exactly 2 digits after `\x`
    * `\x{N}`  — braced hex, 1+ digits
    * `\cX`    — control escape, one char after `\c`
    * `\t \n \r \f \a \e \0` — literal metachar escapes
    * plain literal codepoints

  PGEN's range-ordering validator must decode EACH of those forms to its Unicode codepoint before comparing the two endpoints. PGEN 1.1.28 (`baac0b1`) did this correctly for `\x{N}` / `\xNN` / `\o{N}` / `\cX` / literals. The bare `\NNN` form is the remaining gap:

    * `[\000-\037]` — octal 0..31 — ASCENDING, should be accepted.
    * `[\010-\037]` — octal 8..31 — ASCENDING, should be accepted.
    * `[a-\377]`    — literal 97..octal 255 — ASCENDING, should be accepted.
    * `[\001-\x1f]` — octal 1..hex 31 — ASCENDING, should be accepted.
    * `[\001-\x{1f}]` — octal 1..braced-hex 31 — ASCENDING, should be accepted.

  There is also at least one false-accept residual on `\0` specifically:

    * `[\x1f-\0]` — hex 31..octal 0 — DESCENDING, should be REJECTED.

  Please apply the fix SYMMETRICALLY (covers both endpoint positions) and AUDIT the whole family so a future RGX regression against another form (e.g. `\cX`, `\n`, `\N{U+NNNN}`) doesn't recur. Add explicit coverage in PGEN's compile-validation test matrix for every endpoint × endpoint-form combination.


actual_behavior: |
  Probe against PGEN 1.1.28 (`baac0b1`, contract 1.1.30), pattern → outcome:

    BARE-OCTAL START, bare-octal END (FALSE REJECTS on ASCENDING ranges)
    * `[\000-\037]` → REJ descending  (want OK: 0..31 ascending)
    * `[\000-\017]` → REJ descending  (want OK: 0..15)
    * `[\010-\037]` → REJ descending  (want OK: 8..31)
    * `[\000-\047]` → REJ descending  (want OK: 0..39)
    * `[\000-\057]` → REJ descending  (want OK: 0..47)
    * `[\000-\067]` → OK               (0..55; happens to pass)
    * `[\000-\077]` → OK               (0..63; happens to pass)
    * `[\000-\377]` → OK               (0..255; happens to pass)
    * `[\101-\377]` → OK               (65..255; happens to pass)

    LITERAL-START, bare-octal END (FALSE REJECTS on ASCENDING)
    * `[a-\377]` → REJ descending       (want OK: 97..255)
    * `[A-\377]` → REJ descending       (want OK: 65..255)
    * `[4-\377]` → REJ descending       (want OK: 52..255)
    * `[3-\377]` → OK                    (51..255)
    * `[ -\377]` → OK                    (32..255)

    BARE-OCTAL START, other-form END (FALSE REJECTS on ASCENDING)
    * `[\001-\x1f]` → REJ descending    (want OK: 1..31)
    * `[\001-\x{1f}]` → REJ descending  (want OK: 1..31)
    * `[\x01-\037]` → OK                 (1..31; opposite direction works)
    * `[\001-z]` → OK                     (1..122; start bare-octal + literal end OK)

    FALSE-ACCEPT on DESCENDING (end is single-digit `\0`)
    * `[\x1f-\0]` → OK (WRONG — 31..0 is descending, must reject)
    * `[\xff-\0]` → REJ descending (correct)
    * `[z-\0]` → REJ descending (correct)
    * `[a-\0]` → REJ descending (correct)

    OTHER FORMS — SANITY CHECKS (all currently CORRECT in 1.1.28, confirms the FAMILY scope)
    * `[\x00-\x1f]`   OK  (single-byte hex ascending)
    * `[\x{00}-\x{1f}]` OK (braced hex ascending)
    * `[\o{000}-\o{037}]` OK (braced octal ascending)
    * `[\cA-\cZ]` OK (control escape ascending)
    * `[\x1f-\x00]` REJ descending (single-byte hex correctly rejected)
    * `[\x{FF}-\0]` REJ descending (braced hex vs 1-digit octal correctly rejected)
    * `[\037-\000]` REJ descending (bare octal both ends correctly rejected)

  **Impact on RGX**: 6 PCRE2 conformance cases affected (3× `/^[\000-\037]/` at testinput1:1285, 3× same pattern at testinput6:1763). The other 18 `descending` rejects in the harness are PCRE2 `alt_extended_class` set-algebra forms (`[A--B]`, `[a&&b]`, etc.) and are a separate issue — not the bare-octal family covered by this report.

  **Verification approach**: reverted the submodule pin to PGEN 1.1.26 locally, confirmed all the "want OK" patterns above parsed cleanly at 1.1.26, then re-absorbed 1.1.27 and 1.1.28 and confirmed the `\NNN` form remained broken across both.


