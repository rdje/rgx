id: PGEN-RGX-0072
summary: |
  Regression residual after PGEN 1.1.28: the class_range endpoint-decoder fix applied to braced hex `\x{N}` (which resolved 0071) did NOT extend to the entire *family* of PCRE2 escape forms that can serve as class_range endpoints. Bare `\NNN` (1-3 digit unbraced octal) is still mis-decoded, producing false "descending character class range" rejects on ascending ranges AND at least one false accept of a genuinely descending range. Same class of bug as 0071, broader surface. Asking the PGEN regex family to audit `regex_compile_validation.rs` for every endpoint form listed in pcre2pattern(3) §"Generic character types" as codepoint-producing and apply symmetric decoded-codepoint comparison — rather than point-fix bare octal only, please fix the whole family so no further endpoint-form residuals surface.

