  pattern: '(?{native:check_env})'
  notes: |
    Detected during the RGX walker migration for PGEN 1.1.40 → 1.1.74.
    The `code_block` typed shape was added/refined as part of the slice
    campaign covering atom-subtree typing. The `lang:` prefix
    (e.g. `(?{native:NAME})` for native callbacks) is recognised and
    surfaces in the typed AST's `lang` field — but the body
    (everything between the `:` and the `})`) is dropped on the floor
    when `lang:` is present.

    Observed shapes:
      `(?{ check_env })` (no lang prefix):
        {kind:"code_block", lang:null,
         content:[" ","c","h","e","c","k","_","e","n","v"," "]}
      `(?{native:check_env})`:
        {kind:"code_block", lang:"native", content:[]}    # ⚠ empty
      `(?{native:})`:
        {kind:"code_block", lang:"native", content:[]}
      `(?{native:my_callback_42})`:
        {kind:"code_block", lang:"native", content:[]}    # ⚠ empty

    The PCRE2 callback name is the load-bearing payload — without it,
    RGX's `register_native(NAME, callback)` API has nothing to resolve
    against, and `regex.is_match(...)` against `(?{native:NAME})`
    patterns silently fails to invoke the callback.
expected_behavior: |
  The `content` field should carry the body characters regardless of
  whether `lang:` is prefixed. Both forms should produce parallel
  shapes:

    `(?{ check_env })`:
      {kind:"code_block", lang:null,
       content:[" ","c","h","e","c","k","_","e","n","v"," "]}

    `(?{native:check_env})`:
      {kind:"code_block", lang:"native",
       content:["c","h","e","c","k","_","e","n","v"]}

  (Or content as a single string instead of a char array — either is
  fine downstream as long as the body is preserved.)
actual_behavior: |
  When `lang:<name>:` is present, `content` is `[]` (empty array).
  RGX's adapter receives no callback name to resolve and produces a
  `Regex::CodeBlock { lang:"native", code:"" }` AST — dispatch to a
  registered native callback fails because the name is unknown.

  Verified via `pgen::embedding_api::parse_grammar_profile_ast_dump_named`
  at `regex_default` profile, PGEN pin 108de21d (release 1.1.74).
reproduction: |
  Reproducer matrix:
    pattern_a: `(?{ check_env })`           — Perl-style; content preserved
    pattern_b: `(?{native:check_env})`      — Native; content DROPPED
    pattern_c: `(?{native:})`                — Native, empty payload
    pattern_d: `(?{native:my_callback_42})`  — Native, longer name; DROPPED

  Probe each via the embedding-API AST dump on the `regex_default`
  profile and compare the `content` field. Patterns b and d
  exhibit the bug.

  RGX failing tests post-bump (8 tests in `rgx-core/src/lib.rs`):
    full_mode_native_code_block_can_access_host_variables
    full_mode_native_code_block_can_access_match_metadata
    full_mode_native_code_block_can_use_registered_callback
    full_mode_native_code_block_find_all_surfaces_replacement_results
    full_mode_native_find_first_numeric_with_code_uses_winning_path_numeric
    full_mode_native_find_all_numeric_with_code_collects_numeric_payloads
    full_mode_native_replace_first_with_code_uses_winning_path_replacement
    full_mode_native_replace_with_code_uses_replacement_payloads
    full_mode_native_numeric_helpers_skip_non_numeric_payloads

  Each fails on `is_match(...)` returning false because the native
  callback can't be resolved (RGX has the name registered, but PGEN
  didn't deliver it in the AST so RGX's compiled program looks up
  the empty string and finds nothing).
impact: |
  Class: "parses but returns the wrong AST/dump" — load-bearing
  field dropped silently on the `lang:` branch.

  RGX-specific impact:
    - Native code-block callbacks (`(?{native:NAME})`) are
      effectively non-functional.
    - 8+ lib regression tests fail post-bump.
    - Any RGX user pattern using `(?{native:...})` becomes a no-op
      callback at runtime.

  Workaround: RGX could parse the source span manually (the
  `code_block` rule's input bytes are still in `pattern.as_bytes()`),
  but that requires the adapter to track byte spans through PGEN's
  AST — substantial refactor and against the
  no-PGEN-workarounds rule. Filed here per that policy.
