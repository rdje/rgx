id: PGEN-RGX-0082
summary: |
  PGEN's typed `code_block` shape drops the body content for `(?{native:NAME})` patterns. The typed AST emits `{kind:"code_block", lang:"native", content:[]}` — content is an empty array, so the callback name `NAME` is unrecoverable. The Perl-style `(?{ NAME })` form (no `lang:` prefix) preserves content correctly: `{kind:"code_block", lang:null, content:[" ","N","A","M","E"," "]}`.
