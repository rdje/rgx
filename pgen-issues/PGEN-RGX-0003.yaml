expected_behavior: |
  For a conditional with an explicit false branch, the AST dump should preserve:
  - the condition,
  - a true/yes branch containing only the branch before "|",
  - and a separate false/no branch containing only the branch after "|".

  For (?(1)a|b), that means the yes branch should cover only "a" and the false branch should cover only "b".
actual_behavior: |
  The generated regex backend accepts (?(1)a|b) successfully, but the AST dump emits:
  - condition
  - yes_branch
  - conditional

  The yes_branch span covers bytes 5..8, which includes the full "a|b" alternation. No false_branch node appears anywhere in the accepted tree.
reproduction: |
  Exact tracked reproducer bundle:
  - pgen-issues/artifacts/PGEN-RGX-0003/repro_input.txt
  - pgen-issues/artifacts/PGEN-RGX-0003/pgen_contract.json
  - pgen-issues/artifacts/PGEN-RGX-0003/pgen_parse_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0003/pgen_ast_dump_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0003/pgen_ast_dump.json
  - pgen-issues/artifacts/PGEN-RGX-0003/pgen_trace.log

  Key facts from the bundle:
  - pgen_contract.json reports supports_regex_generated_backend=true, regex_parser_release_version=1.1.0, and regex_integration_contract_version=1.1.0.
  - pgen_parse_outcome.json reports status=success with no diagnostic.
  - pgen_ast_dump.json contains rule_name=condition, rule_name=yes_branch, and rule_name=conditional.
  - pgen_ast_dump.json does not contain any false_branch node.
  - The emitted yes_branch span is start=5, end=8, which covers "a|b" instead of only "a".

  Useful control checks run against the same generated backend:
  - (?(A)a|b) shows the same "yes_branch only" shape.
  - (?(<A>)a|b) shows the same "yes_branch only" shape.

  That control evidence suggests this is a general conditional-branch parsing bug, not a numeric-condition-only bug.
impact: |
  RGX cannot preserve conditional branch structure when consuming the published PGEN transport.

  Any downstream that reconstructs regex semantics from the accepted tree will lose the false branch and therefore change the meaning of the pattern.
