      --features generated_parsers --bin parseability_probe -- \
      --parse-dump-ast-pretty regex \
      pgen-issues/artifacts/PGEN-RGX-0079/repro_input.txt \
      pgen-issues/artifacts/PGEN-RGX-0079/pgen_ast_dump.json \
      --profile regex_default

    cargo run --release -p rgx-core --example dump_octal_brace_artifacts
  pattern: "\\o{1239}"
  input: "\\o{1239}"
  notes: |
    Downstream project: RGX (https://github.com/<host>/rgx)

    PCRE2 10.47 rejects this pattern at compile time with
    `error 164 at offset 9: non-octal character in \o{} (closing brace missing?)`,
    surfacing the bad `9` digit. PGEN's regex_default profile silently accepts
    it, allocating two unrelated AST nodes (escape on `\o`, counted_quantifier
    on `{1239}`).

    Reproduction in pcre2test:
      /\o{1239}/
      Failed: error 164 at offset 9: non-octal character in \o{} (closing brace missing?)
              here: \o{1239 |<--| }

    This bug is the residual surface area of PGEN-RGX-0006 (closed 2026-04-06,
    fixed in PGEN 1.1.3). The 0006 fix added an octal_escape rule that recognises
    `\o{<octal_digits>}` when every brace-content character is a valid octal
    digit (0..7). When *any* character inside the braces is non-octal, the
    grammar backtracks all the way out and re-parses the byte sequence as
    `\o` (simple_escape) + `{NNN}` (counted_quantifier). This means an invalid
    pattern survives the parser and reaches downstream consumers as a
    structurally valid AST.

    The same bug class also affects `\o{}` with empty braces, decimal-only
    contents past the octal range, and contents containing letters
    (`\o{12abc}` parses as a chain of literal pieces). See "Reproducer
    matrix" below.

    Recommended PGEN fix: commit/cut after `\o{` so that, once the prefix
    is matched, the parser is required to consume octal digits up to the
    matching `}` and emit a structured parse error if the contents are not
    valid octal. This mirrors the existing committed treatment of `\x{...}`
    braced hex.
expected_behavior: |
  PGEN's regex_default profile should reject `\o{1239}` at parse time, with a
  structured `ParseDiagnostic` whose `byte_offset` points at the offending
  non-octal digit (`9` at byte offset 5 of the input `\o{1239}`).

  Equivalently, the grammar's `octal_escape` rule (or the prefix that
  matches `\o{`) should commit, so that `\o{1239}` does NOT silently
  succeed via the simple_escape + counted_quantifier fallback.

  Acceptable structured shapes (downstream is flexible — any of these
  works as long as the parse is a *failure*, not a successful misparse):
    1. `parse_outcome.status = "failure"` with diagnostic pointing at
       the bad digit.
    2. `parse_outcome.status = "success"` only when every brace-content
       character is in `[0-7]` AND there is at least one digit AND the
       sequence terminates with `}`.

  For comparison, the existing braced hex escape `\x{...}` already commits
  in this fashion: `\x{12g}` should likewise be rejected (verifying that
  invariant is suggested as part of the same audit).

  Reproducer matrix — patterns that exercise the same bug class:
    `\o{1239}`   — non-octal digit `9`
    `\o{8}`      — `8` is not an octal digit (smallest reproducer)
    `\o{}`       — empty braces (no digits)
    `\o{12abc}`  — letters mixed in
    `\o{12 34}`  — whitespace inside braces

  PGEN-RGX-0006's closing tree shape (kept for reference) was:
    atom -> escape -> escape_unit -> octal_escape [Sequence]
      element_0 (or fused prefix): Terminal("o{")
      element_1 -> octal_digits [Quantified, '+']
        octal_digit -> digit: Terminal("1")
        octal_digit -> digit: Terminal("0")
        octal_digit -> digit: Terminal("1")
      element_2: Terminal("}")

  The 0079 fix should make that rule reject when octal_digit fails to
  match a brace-content character, rather than backtracking out to
  simple_escape + counted_quantifier.
actual_behavior: |
  `parse_full` succeeds. The AST dump (see `pgen_embedding_ast_dump.json`)
  shows the brace contents as a counted_quantifier on a literal `o`:

    {
      "atom": ["\\", "o"],
      "quantifier": {
        "greediness": [],
        "max": 1239,
        "min": 1239,
        "type": "quantifier"
      },
      "type": "piece"
    }

  This is structurally identical to the original PGEN-RGX-0006 misparse,
  with the only difference being that the brace-content `1239` survives
  as the quantifier bounds. RGX's adapter then compiles the pattern as
  `o` repeated 1239 times — a silently-wrong AST, not a rejection.

  Evidence:
    - 0 occurrences of `octal_escape` in the AST dump
    - 1 occurrence of `quantifier` (carrying min=max=1239) on a literal `o`
    - successful parse_outcome.status = "success", no diagnostic

  PCRE2's behaviour, for reference:
    Failed: error 164 at offset 9:
      non-octal character in \o{} (closing brace missing?)
      here: \o{1239 |<--| }

  Same input, opposite verdict.
