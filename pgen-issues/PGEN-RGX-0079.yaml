impact: |
  Class: "parses but returns the wrong AST/dump" — same as the original
  PGEN-RGX-0006. Downstream consumers that trust PGEN's parse outcome
  will silently accept patterns that PCRE2 (and any other PCRE2-compatible
  flavour) reject.

  RGX-specific impact:
    - PCRE2 conformance regression: testinput2:3979 (`/^A\o{1239}B/`)
      currently flagged in the "RGX too permissive" bucket of the harness
      (5 cases total, this is one of them).
    - Any user pattern containing `\o{<contents-with-non-octal-char>}`
      compiles to a quantified literal `o` instead of being rejected at
      parse time.

  Workaround on the RGX side: detect the `["\\", "o"]` atom + non-empty
  counted_quantifier pattern in the adapter and reject. This is a
  workaround, not a fix, and is rejected by the project's
  no-PGEN-workarounds rule (see `feedback_no_pgen_workarounds.md` in the
  RGX session memory: "Parsing issues must be fixed in PGEN, not hacked
  around in RGX"). Filed here per that policy.
