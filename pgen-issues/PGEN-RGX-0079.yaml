id: PGEN-RGX-0079
summary: |
  Braced octal escape `\o{...}` containing a non-octal digit (e.g. `\o{1239}`) is silently misparsed as a simple_escape for `\o` followed by a counted_quantifier `{1239}` instead of being rejected as an invalid octal escape. Same shape as PGEN-RGX-0006 (closed in PGEN 1.1.3) — that fix only handled valid-octal-digit content; non-octal contents still fall back to the literal+quantifier interpretation.
