id: PGEN-RGX-0085
summary: |
  PGEN's regex parse + AST-dump production
  (`pgen::embedding_api::parse_regex_default_ast_dump`, the exact
  entry RGX's adapter uses) has NO internal nesting / recursion
  ceiling anywhere in the deep-recursion family. On a deeply nested
  pattern it exhausts the thread stack and HARD-ABORTS the *host
  process* (EXC_BAD_ACCESS on the stack guard page → SIGABRT)
  instead of returning a recoverable parse error / `ParseDiagnostic`.
  The overflow surfaces in either of two sub-paths of the same
  call, both unbounded:
    A. recursive serialization of the deeply-nested AST `Value`
       tree into the dump JSON (`serde_json::value::ser::…` /
       `to_value` / `SerializeMap` / `SerializeVec`, recursing per
       AST level);
    B. the recursive-descent parse itself
       (`RegexParser::parse_group → parse_capturing_group →
       parse_pattern → parse_alternation → parse_alternative →
       parse_concatenation → parse_piece → parse_atom →
       parse_group → …`, one frame-chain per `(` level).
  A library that accepts untrusted patterns cannot defend against
  this without refusing to call the sole parser.
