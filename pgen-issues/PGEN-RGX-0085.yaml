expected_behavior: |
  PGEN's parser should impose a configurable internal
  nesting / recursion-depth ceiling and, when a pattern exceeds it,
  return a clean parse failure — ideally a `ParseDiagnostic` whose
  `location` (`byte_offset` / `line` / `column`) points at the `(`
  that crossed the limit — instead of recursing until the stack
  guard page faults and the host process is aborted.

  Reference behaviour from the ecosystem:
    - PCRE2: default parenthesis-nesting limit is 250
      (`PCRE2_CONFIG_PARENSLIMIT`, build-time
      `--with-parens-nest-limit`); `pcre2_compile` returns the
      clean error "parentheses are too deeply nested".
    - Rust `regex` crate: default `nest_limit = 250`; the parser
      returns a structured error past it.

  The control artifact `pgen_parse_outcome_control.json` (a
  depth-10 pattern) shows the parser is *correct* on within-budget
  input — the only defect is the absent recursion ceiling.
actual_behavior: |
  Class: **panics/crashes** (also pathological resource usage —
  unbounded stack growth).

  `parse_regex_default_ast_dump` recurses with no ceiling and the
  process aborts inside the call (no `ParseOutcome` /
  `ParseDiagnostic` is ever produced):

      thread '…' has overflowed its stack
      fatal runtime error: stack overflow, aborting
      (signal: 6, SIGABRT — EXC_BAD_ACCESS on the stack guard page)

  Two captured manifestations of the same family (full backtraces:
  `pgen-issues/artifacts/PGEN-RGX-0085/pgen_crash_backtrace.txt`):

    A. **Recursive AST-dump serialization.** Overflow in
       `serde_json::value::ser::<impl Serialize for Value>::serialize`
       → `to_value` → `SerializeMap::serialize_value` /
       `SerializeVec::serialize_element`, recursing once per AST
       nesting level while PGEN serializes the deeply nested AST
       `Value` tree into the dump JSON. Reproduced 4/4 at nest
       depth 500 on a 2 MiB thread (debug).

    B. **Recursive-descent parse.** Overflow in
       `pgen::generated_parsers::regex::RegexParser::parse_group →
       parse_capturing_group → parse_pattern → parse_alternation →
       parse_alternative → parse_concatenation → parse_piece →
       parse_atom → parse_group → …`, one frame-chain per `(`
       level, in `generated/regex_parser.rs`. Captured from the
       failing `cargo test` (libtest worker thread).

  **Non-monotonic in depth** (the insidious part): depth 500
  aborts but 2000 / 8000 / 30000 / 120000 *survive* on the same
  2 MiB thread. This is the `serde_stacker` heuristic-growth
  signature — `serde_stacker` only protects the JSON *deserialize*
  step; when its grow heuristic happens not to fire for a given
  depth, the *unprotected* recursion (serialize in A, parse in B)
  overflows. So the crash depth is not a clean threshold and
  cannot be defended by "reject deeper than the deepest observed
  crash"; only a true ceiling fixes it.

  Because the abort is a process-level SIGABRT (not an unwinding
  panic) it cannot be caught with `catch_unwind`; the only
  host-side defense is to refuse to call the parser on over-nested
  input.
reproduction: |
  Faithful failing shape — nested `(X)*` (a group AND a quantifier
  per level), exactly as RGX builds it in
  `tests/stress_tests.rs::compile_patterns_of_increasing_complexity`:

      let mut p = String::from("a");
      for _ in 0..DEPTH { p = format!("({p})*"); }

  (Note: a plain `((((a))))` shape does NOT reproduce — PGEN
  rejects it shallowly. The quantifier per level is load-bearing.)

  Artifacts in `pgen-issues/artifacts/PGEN-RGX-0085/`:
    - repro_input.txt        — 200,000 levels of `(X)*`
                               (600,001 bytes).
    - repro_input_small.txt  — 5,000 levels of `(X)*` (15,001 B).
    - pgen_contract.json     — `parser_embedding_api_contract()`.
    - pgen_parse_outcome_control.json — depth-10 control, parses OK.
    - pgen_crash_backtrace.txt — both captured backtraces
                               (A: serialize, B: parse).
    - host_call_site.md      — call chain + verification harness.

  **Deterministic minimal reproduction (verified, 4/4 aborts).**
  Build profile and thread-stack size matter — the overflow needs
  large (debug) frames on a constrained stack, and the crash depth
  is non-monotonic (see actual_behavior). This recipe reproduces
  reliably; it uses the exact embedding-API entry RGX's adapter
  calls (`parse_regex_default_ast_dump`), no RGX code in the path:

      // debug build; run on a libtest-sized (2 MiB) thread.
      use pgen::embedding_api::{parse_regex_default_ast_dump, AstDumpOptions};
      std::thread::Builder::new()
          .stack_size(2 * 1024 * 1024)
          .spawn(|| {
              let mut p = String::from("a");
              for _ in 0..500 { p = format!("({p})*"); }   // depth 500
              let _ = parse_regex_default_ast_dump(
                  &p, &AstDumpOptions { pretty: false, max_ast_bytes: None });
          }).unwrap().join().unwrap();
      // -> Abort trap: 6 (EXC_BAD_ACCESS on the stack guard page)

  Environment-independent reproduction (overflows even an 8 MiB
  main-thread stack): use `repro_input.txt` (200,000 levels) as the
  pattern. The original end-to-end reproduction is simply
  `cargo test -p rgx-core --test stress_tests
  compile_patterns_of_increasing_complexity` at RGX's pre-fix
  commit (default debug build) — SIGABRT, backtrace B.

  Pre-release verification gate (suggested for the PGEN ledger's
  "validating regression/gate proof" — run on a 2 MiB thread so a
  guardless build fails deterministically):

      let mut deep = String::from("a");
      for _ in 0..2000 { deep = format!("({deep})*"); }
      let r = parse_regex_default_ast_dump(
          &deep, &AstDumpOptions { pretty:false, max_ast_bytes:None });
      assert!(r.status != ParseStatus::Success || r.ast_dump.is_some());
      // MUST return a value (Success/Failure + optional diagnostic),
      // MUST NOT abort the process, at ANY depth on a 2 MiB stack.
      let mut ok = String::from("a");
      for _ in 0..64 { ok = format!("({ok})*"); }
      assert!(parse_regex_default_ast_dump(
          &ok, &AstDumpOptions{pretty:false,max_ast_bytes:None})
          .status == ParseStatus::Success);
impact: |
  Severity: high. A single deeply nested pattern aborts the entire
  host process — the worst possible failure mode for a parsing
  library, and a trivial denial-of-service vector for any service
  that compiles user-supplied regexes. It is strictly worse than a
  "wrong AST" bug: there is no value to validate and no error to
  handle; the host simply dies.

  RGX-specific impact:
    - Breaks the COMMIT.md mandatory quality gate
      `cargo test -p rgx-core` (integration suite SIGABRT).
    - Publish-readiness criterion #3 ("no showstopper bugs").
    - Undermines RGX's advertised DoS-safety guarantees
      (`set_max_steps` / `set_max_backtrack_frames` /
      `set_max_recursion_depth` are the *runtime* analogs; this is
      the missing *compile-time* analog).

  No-workaround stance per CLAUDE.md / `feedback_no_pgen_workarounds`:
  RGX has NOT added adapter code that absorbs or rewrites PGEN's
  AST. RGX's mitigation, pending PGEN's fix, is pure input
  validation + stack provisioning:
    - reject patterns nested past a deterministic ceiling
      (MAX_NESTING_DEPTH = 1000, 4× the PCRE2 / `regex` default of
      250) with a clean compile error *before* PGEN is invoked;
    - run PGEN's correct, unmodified parse on a `stacker`-grown
      stack — exact parity with the `serde_stacker` treatment RGX
      already applies to PGEN's JSON deserialization.
  PGEN's parser still owns the real fix (its own recursion guard);
  this report is the upstream channel so the RGX-side ceiling
  becomes belt-and-suspenders rather than the sole protection.
resolution:
  status: resolved
  fixed_in_pgen_release: "1.1.77"   # contract 1.1.79; pin 65b845f0
  fixed_in_pgen_commit: 2f6be365    # "RGX-0085 FIXED + tree CLOSED:
                                    # regex parenthesis-nesting ceiling"
  verified_at: 2026-05-18T00:00:00Z
  verified_by: RGX (combined-release verification of subs/pgen 65b845f0)
  verification_notes: |
    CLOSED. PGEN release 1.1.77 adds `REGEX_MAX_NESTING_DEPTH = 250`
    (= PCRE2 `PCRE2_CONFIG_PARENSLIMIT`) enforced at the embedding-API
    boundary before recursive descent; over-nested input returns a
    clean `ParseDiagnostic` (`E_PARSE_FAILURE`) instead of SIGABRT —
    a host-process abort is now structurally impossible. RGX-side
    verification on the adopted pin 65b845f0:
      - `cargo test -p rgx-core --test stress_tests` 25/0 and
        `--test adversarial` 44/0 — all deep-nesting cases green
        (`deeply_nested_within_limit_does_not_abort`,
        `pattern_nested_past_limit_returns_clean_error`,
        `pattern_nested_just_under_limit_is_not_limit_rejected`,
        `from_ast_deeply_nested_does_not_abort`, `deeply_nested_groups`).
      - PCRE2 conformance ratchet not regressed by the ceiling (no
        corpus pattern's nesting is affected adversely).
    RGX retains its pre-PGEN `MAX_NESTING_DEPTH = 1000` as endorsed
    defense-in-depth (esp. the `from_ast` parser-bypass path);
    PGEN's stricter 250 now triggers first for the parse path. No
    RGX code change required; narrative reconciled in the live docs.
