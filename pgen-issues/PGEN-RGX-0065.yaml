id: PGEN-RGX-0065
summary: |
  PGEN regex parser rejects the PCRE2 pattern-start verb (*UTF8) with "unrecognized PCRE2 verb or start option". PCRE2 10.47 accepts (*UTF8) as an alias for (*UTF) — testoutput10:754 shows /(*UTF8)\x{1234}/ matching "\x{1234}" in subject "abcd\x{1234}pqr".
status: closed
opened_at: 2026-04-16T00:00:00Z
first_seen_at: 2026-04-16T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

# === Parser identity (per PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md §1) ===
parser_backend: pgen
parser_backend_version: "ffd61e9"
parser_release_version: "1.1.25"
integration_contract_version: "1.1.27"
parser_family: regex
profile: regex_default
integration_surface: parseability_probe
generated_artifact: "PGEN submodule subs/pgen, embedded via rgx-core/src/parsing.rs"

# === Host project identity (per protocol §2) ===
host_project: rgx
rgx_commit: 25db551
host_os: macos
host_arch: aarch64
rust_toolchain: "rustc per workspace rust-version = 1.88"
cargo_features: "default + pgen-parser"

upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0065/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0065/pgen_trace.log
  pattern: "(*UTF8)\\x{1234}"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput10` line 246. PCRE2 10.47
    accepts `(*UTF8)` as an alias for `(*UTF)` — verified via
    testoutput10:754 showing `/(*UTF8)\x{1234}/` matching
    `"\x{1234}"` in subject `"abcd\x{1234}pqr"`. The alias
    corresponds to the 8-bit library convention (mirrors
    `(*UTF16)` / `(*UTF32)` in their respective width-specific
    builds).

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept `(*UTF8)` as a pattern-start verb
  synonymous with `(*UTF)`. Per pcre2pattern(3)
  §"Newline and case start options" the `(*UTF8)` / `(*UTF16)` /
  `(*UTF32)` forms are the PCRE2-1/2/4-specific aliases for
  `(*UTF)` — each selects the corresponding code-unit width
  while keeping the generic `(*UTF)` form valid across all
  three widths.

  Suggested grammar amendment in
  `subs/pgen/grammars/regex.ebnf`: extend the pattern-start-
  verb alternation with `(*UTF8)`, `(*UTF16)`, `(*UTF32)`
  alongside the existing `(*UTF)` production.

actual_behavior: |
  PGEN rejects the pattern with:
        regex compile error: E_PARSE_FAILURE: unrecognized PCRE2 verb or start option
        (*UTF8)\x{1234}
           ^

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0065/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0065/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0065/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  1 direct testinput10 case. Trivial grammar fix (add three
  alias tokens to the pattern-start-verb production) unlocks
  it plus any future tests that use the width-specific UTF
  aliases.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.26"
  fixed_in_parser_backend_version: "5856f71"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.26 (commit 5856f71, "regex: release RGX 0065 and
    0066 fixes") adds `(*UTF8)`, `(*UTF16)`, `(*UTF32)` as
    pattern-start-verb aliases for `(*UTF)` — the commit
    message cites this report as "accept PCRE2 UTF width start
    aliases".

    Verified:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '(*UTF8)\x{1234}' /tmp/v.json
    → status=success.

    No RGX adapter change required; the atom already flows
    through the directive-verb path which treats the UTF-family
    verbs as no-ops for the `&str`-based API.
