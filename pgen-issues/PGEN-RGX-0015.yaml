id: PGEN-RGX-0015
summary: |
  PGEN regex parser does not recognize PCRE2 10.47+ returned-capture
  subroutine syntax: (?1(grouplist)). This is a feature request, not
  a bug — the syntax is new in PCRE2 10.47 and has minimal adoption.
status: closed
opened_at: 2026-04-08T00:00:00Z
first_seen_at: 2026-04-08T00:00:00Z
last_updated_at: 2026-04-09T00:00:00Z
parser_backend: pgen
parser_backend_version: "1.1.9"
rgx_commit: 61baa2c
upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null
context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: "parseability_probe --parse regex repro_input.txt --profile regex_default"
  pattern: "(?1(1))"
  input: ""
  notes: |
    PCRE2 10.47 introduced (?N(grouplist)) syntax for subroutines that
    return their captures to the caller instead of discarding them.
    This is tracked as RGX backlog item A12.
expected_behavior: |
  PGEN should parse (?1(1)) and produce a structured AST node
  (e.g., rule name "returned_capture_subroutine" or similar) with
  the subroutine target and the group list.
actual_behavior: |
  Fixed in PGEN 1.1.9. Now produces:
    - returned_capture_subroutine (top-level node)
    - subroutine_target (the target group number)
    - returned_capture_group_list (the groups to return)
    - returned_capture_group (individual group entries)
reproduction: |
  File: repro_input.txt containing: (?1(1))

  Command (PGEN 1.1.9):
    cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
      --bin parseability_probe -- --parse regex repro_input.txt --profile regex_default

  Result: "parse_full passed"
impact: |
  Unblocks A12 (returned-capture subroutines) from the RGX backlog.
resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  verified_at: 2026-04-09T00:00:00Z
  verification_notes: |
    PGEN 1.1.9 (commit ac2acb3) parses (?1(1)) successfully.
    AST produces returned_capture_subroutine with subroutine_target
    and returned_capture_group_list nodes.
    RGX submodule pinned to 1.1.9.
    RGX-side A12 implementation can now proceed.
