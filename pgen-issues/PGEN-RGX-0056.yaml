id: PGEN-RGX-0056
summary: |
  PGEN regex parser does not accept the PCRE2 short-form Unicode property escape `\pX` / `\PX` (single-letter property name without braces). PGEN falls through to `simple_escape(p|P)` instead of producing a `property_escape` AST node.
