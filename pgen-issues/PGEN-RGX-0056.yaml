context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0056/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0056/pgen_trace.log
  pattern: "\\pL"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` (and 5+ other testinput
    files containing `\pL`, `\pN`, `\PC`, etc.). PCRE2 10.47
    accepts and matches the short-form Unicode property escape
    `\pX` / `\PX` as shorthand for `\p{X}` / `\P{X}` where X is
    a single-character property name (pcre2pattern(3),
    "Generic character types" §"Categories of characters").
    Affects ~66 test cases distilled from a 327-failure cluster.

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  PGEN should emit a `property_escape` AST node for `\pX` / `\PX`
  (single-letter property name without braces), equivalent to the
  `\p{X}` / `\P{X}` braced form. PCRE2's pcre2pattern(3) documents
  this as the canonical short syntax. Suggested grammar
  amendment in `subs/pgen/grammars/regex.ebnf:220`:

      property_escape = "p{" prop_name "}"
                      | "P{" prop_name "}"
                      | "p"  short_prop_letter
                      | "P"  short_prop_letter
      short_prop_letter = "C" | "L" | "M" | "N" | "P" | "S" | "Z"

  (PCRE2 only allows the seven major-category single letters in
  the short form, listed above.) The emitted AST should be
  identical to `\p{C}`, `\p{L}`, etc.

actual_behavior: |
  PGEN parses the input but emits `simple_escape` with character
  `'p'` (or `'P'`), losing the property semantics entirely. The
  next character (the property letter) is then read as a separate
  literal atom. RGX `Regex::compile("\\pL")` fails at the adapter
  contract guard:
        regex compile error: pgen AST contract mismatch: unrecognized simple_escape character 'p'

  The contract mismatch is downstream — the upstream issue is
  PGEN treating `\pL` as `\p` + `L` rather than as a single
  property escape.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0056/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0056/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0056/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  ~66 test cases across the PCRE2 10.47 testdata corpus depend on
  the `\pX` / `\PX` short form. Patterns affected include
  `^\PC\pL\pM\pN\pP\pS\pZ<`, `^\pN{3,}+(.)`, `(?<!\pL)XYZ`,
  `\pL`, `^[\pL](abc)(?1)`, `[\pS#moq]`, etc. — all currently
  fail RGX `Regex::compile`. With the grammar fix, all should
  compile and match equivalently to their `\p{X}` braced
  counterparts. One of seven root causes the conformance team
  distilled from a 327-failure cluster (the others are RGX-side
  adapter gaps or real PCRE2 feature work).

