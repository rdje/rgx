      note: 'UTF-8 mode; PCRE2 ACCEPTS (\777 = U+01FF); subjects \x{1ff} and \777'
expected_behavior: |
  Under UTF (PCRE2 `,utf` / `(*UTF)` / 16-/32-bit), a bare octal
  escape is valid up to the Unicode codepoint maximum, so `\777`
  (U+01FF), `\400`, `\6666` etc. are valid characters and PCRE2
  10.47 ACCEPTS them. Only in 8-bit non-UTF mode is `>0o377` an
  error (151). PGEN parses mode-agnostically, so it must NOT
  unconditionally hard-reject `>0o377`: either defer the range
  check to the consumer/mode, or emit the octal atom and let the
  width/UTF context decide (the pre-FIX2.3 behaviour for the
  in-range part), rather than a blanket parse-time reject.
actual_behavior: |
  PGEN 1.1.80 (pin 5fd20609) REJECTS `\777`, `(?u)\777`, `\400`,
  `(?u)\400`, `(?u)\777ABC` — uniformly, regardless of UTF mode
  (inline `(?u)` does not change it; the grammar reject is
  unconditional). `\377` still ACCEPTs (boundary correct). PCRE2
  10.47 accepts `\777` under `,utf`.
conformance_impact: |
  Sole new failure introduced by adopting pin 5fd20609:
  testinput10:218 `/\777/I,utf` (RGX rejects; PCRE2 accepts). The
  pin is still a NET IMPROVEMENT — PGEN-RGX-0087's testinput2:4671
  + :4674 closed (+2), this opened (−1): RGX PCRE2 ratchet
  12,805 / 5 (pin 65b845f0) -> 12,806 / 4 (pin 5fd20609). RGX
  ADOPTS 5fd20609 and rebaselines to 12,806/4 (the differential
  harness's "NEW BASELINE ELIGIBLE — lock in the improvement"
  path); the residual −1 is this report. No RGX workaround
  (feedback_no_pgen_workarounds).
resolution:
  status: resolved
  fixed_in_pgen_release: "1.1.81"   # contract 1.1.83
  fixed_in_pgen_commit: db6f8c68    # "RGX-0088.1+.2: scoped revert of
                                    # FIX2.3's mode-blind octal->0o377
                                    # parse-reject; PGEN-RGX-0088 RESOLVED"
  verified_at: 2026-05-19T00:00:00Z
  verified_by: RGX (PCRE2 differential conformance on subs/pgen db6f8c68)
  verification_notes: |
    CLOSED. PGEN rel 1.1.81 reverts exactly FIX2.3's two grammar
    edits: octal `>0o377` is no longer an unconditional parse-time
    reject — PGEN emits the octal atom mode-agnostically (the
    report-prescribed resolution; a mode-agnostic grammar must not
    make a mode-dependent range decision). Verified on db6f8c68:
      - `\777` ACCEPT, matches U+01FF; `\400`/`\666`/`\6666666666`/
        `[\666]`/`[\777]` ACCEPT (octal atom). `\377`/`[\377]`/`\012`
        byte-identical accept.
      - 0087 family byte-identical / FIX2.3-independent: `\81`@8g /
        `\89` / `\80` REJECT; `[\8]`/`[\9]`/`^[A\8B\9C]+$`/`[\88]`
        ACCEPT; `\199`→\x01+"99"; `\10`@9g / `\8`@8g unchanged.
      - PCRE2 differential: the originally-reported defect
        `testinput10:218 /\777/I,utf` is CLOSED (RGX now accepts
        \777=U+01FF, matching PCRE2 `,utf`). Ratchet unchanged
        12,806 / 4 (gate green, no rebaseline).
    Regression test added:
    `rgx-core/src/lib.rs::tests::octal_escape_over_0o377_is_a_codepoint_not_a_parse_reject`.
  not_a_reopen_and_not_a_new_bug: |
    Closing this re-exposes `testinput9:287 /(?i:A{1,}\6666666666)/`
    as "RGX too permissive" (PCRE2 rejects, RGX accepts) — the swap
    that keeps the ratchet at 12,806/4 (testinput10:218 −1,
    testinput9:287 +1). This is **NOT** a 0088 reopen, **NOT** a
    PGEN bug, and **NOT** an RGX defect:
      - `testinput9` is PGEN/PCRE2's **8-bit-library-only** testfile
        (`# run only with the 8-bit library`, `#forbid_utf`). There,
        `\666` = 0o666 = 438 > 255 ⇒ PCRE2 error 151.
      - RGX is a Unicode / code-point engine *by design* (no 8-bit
        non-UTF mode); `\666` is the valid codepoint U+01B6. RGX
        accepting `\666`+literals is the PCRE2-`,utf`-faithful
        behaviour — exactly what PGEN-RGX-0088 made correct.
      - It is a permanent, expected RGX-Unicode-vs-PCRE2-8-bit
        differential residual (a Unicode engine cannot match an
        8-bit-overflow rejection without modelling an 8-bit mode it
        does not have, by design). Catalogued as a known residual;
        no PGEN report (PGEN's mode-agnostic emission is correct per
        this very report's prescribed resolution), no RGX fix.
