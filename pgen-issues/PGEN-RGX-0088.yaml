       octal atom is emitted for the consumer to range-check by width).
    2. Probe: `\777`, `(?u)\777`, `\400` ACCEPT; `\377` still ACCEPT;
       8-bit-non-UTF overflow still rejects per PCRE2.
    3. Re-run `cargo test -p rgx-core --test pcre2_conformance --
       --ignored`; confirm testinput10:218 closes and bump
       PASS_BASELINE/FAIL_BASELINE toward 12,807/3 in the same commit.
