id: PGEN-RGX-0088
summary: |
  Family-linked to PGEN-RGX-0084/0087 (the `\NN…` octal-vs-backref /
  octal-range cluster, ledger `REGEX-008x`). **PGEN-RGX-0087 is
  FIXED & CLOSED** (rel 1.1.80, pin 5fd20609 — FIX2.1+.2 scoped the
  `[89]`-leading hard-reject to non-class context, FIX2.3 added the
  octal `>\377` overflow reject). PGEN-RGX-0088 is the NEW residual
  FIX2.3 introduced, NOT a 0087 reopen.

  FIX2.3 rejects every bare `\ddd` octal payload whose value exceeds
  `0o377`, grammar-only and **unconditionally**. That is PCRE2-
  faithful for 8-bit non-UTF mode (PCRE2 error 151). But in **UTF
  mode** an octal escape up to the Unicode codepoint max is valid —
  `\777` = U+01FF — and PCRE2 10.47 **accepts** it. PGEN's parser is
  mode-agnostic (it does not see `utf` / 8-bit / 16-/32-bit at parse
  time), so FIX2.3's unconditional `>0o377` hard-reject is OVER-BROAD:
  it rejects `\777`-class octal escapes that PCRE2 accepts under UTF.
