id: PGEN-RGX-0016
summary: |
  PGEN regex parser does not recognize PCRE2 VERSION conditionals:
  (?(VERSION op X.Y)yes|no). This blocks RGX backlog item A13. The
  RGX-side parser short-circuit logic is in place; only the PGEN
  grammar update is needed.
status: open
opened_at: 2026-04-12T00:00:00Z
first_seen_at: 2026-04-12T00:00:00Z
last_updated_at: 2026-04-12T00:00:00Z

