parser_backend: pgen
parser_backend_version: "ac2acb3"
parser_release_version: "1.1.9"
integration_contract_version: "1.1.9"
parser_family: regex
profile: regex_default
integration_surface: parseability_probe
generated_artifact: "PGEN submodule subs/pgen, embedded via rgx-core/src/parsing.rs"

# === Host project identity (per protocol §2) ===
host_project: rgx
rgx_commit: 7d195a4
host_os: macOS (Darwin 24.6.0)
