          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0071/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in `pgen_parse_outcome.json` (or, for contract mismatches, RGX's compile error captured in `actual_behavior`).

impact: |
  One of many PGEN-related failures uncovered by RGX's
  PCRE2 10.47 testinput1 conformance harness. Each failing pattern
  also blocks RGX from passing the corresponding pcre2test case.
  Aggregate impact is tracked in `docs/BACKLOG.md` C7.

resolution:
  status: fixed-upstream
  fixed_in_rgx_commit: null
  verified_at: null
  verification_notes: |
    PGEN 1.1.28 (baac0b1) fixed `regex_compile_validation.rs` to compare range endpoints by decoded literal escape value instead of the escaped payload's leading byte. `[z-\x{100}]` now parses as an ascending range. Verified by re-running the RGX PCRE2 conformance harness: pass count moves 8,927 -> 8,935, the ~70 regressed cases from 1.1.27 are recovered, and the 0067..0070 fixes are additive on top.
