  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput10` block #0 starting
    near input line 428. PCRE2 10.47 accepts and matches this pattern in its own pcre2test harness; PGEN's regex grammar diverges as recorded under `actual_behavior`.

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  PGEN should accept `[z-\x{100}]` as an ascending class_range with endpoints U+007A..U+0100. Per pcre2pattern(3), braced hex `\x{N}` produces the Unicode codepoint N and is valid as a class_range endpoint — the PGEN 1.1.27 release notes explicitly call out "keeps literal braced hex/octal escapes range-capable". The descending-range validator should compare the two endpoints by Unicode codepoint value: 0x7A = 122 < 0x100 = 256, so the range is ascending and should be accepted.

actual_behavior: |
  PGEN 1.1.27 rejects `[z-\x{100}]` with `E_PARSE_FAILURE: descending character class range is not accepted by the regex compile contract`. Identical shape bugs on `[z-\x{200}]`, `[Qz-\x{200}]/utf`, `[z-\x{100}]/i`, and siblings. Impact on RGX: ~70 previously-passing PCRE2 conformance cases now fail (found via per-case diff of `cargo test -p rgx-core --test pcre2_conformance --release -- --ignored pcre2_full_testdata_conformance --nocapture` output pre/post the PGEN bump). Likely root cause: the compile-validation code that compares range endpoints may be interpreting `\x{100}` as decimal 100 (= U+0064, which IS less than z=U+007A, hence the "descending" verdict) rather than as hex 0x100 = 256. The single-byte hex form `\xNN` works because the two hex digits are unambiguously parsed as hex. Blocking the PGEN 1.1.27 absorption in RGX until fixed — we are staying on 1.1.26 in the submodule pin and holding the 0067..0070 fixes until 1.1.28.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0071/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0071/repro_input.txt \
