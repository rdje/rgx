id: PGEN-RGX-0071
summary: |
  Regression in PGEN 1.1.27: `regex_compile_validation.rs` rejects `[z-\x{100}]` with "descending character class range is not accepted by the regex compile contract" — but the range IS ascending (z = U+007A = 122 decimal, \x{100} = U+0100 = 256 decimal). The same bug affects `[z-\x{200}]`, `[Qz-\x{200}]`, `[z-\x{100}]/i` / `/IBi`, and every `class_range` where a braced hex escape `\x{NNN}` is the endpoint and its Unicode codepoint is >= 256. Single-byte hex `\xNN` works — the regression is specific to braced hex `\x{...}`. Did NOT exist in PGEN 1.1.26 (verified by reverting the submodule pin to 5856f71 and re-running the conformance harness).
status: closed
opened_at: 2026-04-17T18:31:55Z
first_seen_at: 2026-04-17T18:31:55Z
