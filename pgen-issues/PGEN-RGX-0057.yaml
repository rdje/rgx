  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0057/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0057/pgen_trace.log
  pattern: "[z\\Qa-d]\\E]"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` line 3841. PCRE2 10.47
    accepts and matches this pattern: `\Q...\E` inside a
    character class adds the literal byte sequence between
    the delimiters as members of the class. The pattern
    `[z\Qa-d]\E]` is the literal class `[zad-]` followed by
    a literal `]`. Affects ~138 test cases across the corpus.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept `\Q...\E` literal-quote sequences that
  appear inside a character class `[...]`, treating the bytes
  between `\Q` and `\E` as literal class members. Per
  pcre2pattern(3) §"Generic character types": "Outside a
  character class, the escape sequence \Q...\E ... a
  literal-text region. The same is true within a character
  class, where each character is added to the class as a
  literal. Note in particular that meta-characters such as
  `]` are taken literally between \Q and \E inside a class."

  Suggested grammar amendment in
  `subs/pgen/grammars/regex.ebnf`:

      class_item = ... | quoted_class_literal | ...
      quoted_class_literal = "\Q" quoted_body "\E"

  where `quoted_body` matches any sequence of bytes up to
  `\E` (or end-of-pattern, in which case the implicit `\E`
  applies — the quoted region runs to end-of-pattern, per
  pcre2pattern(3)).

actual_behavior: |
  PGEN rejects the pattern with a hard parse failure:
        regex compile error: E_PARSE_FAILURE: escape is not accepted inside a character class by the regex compile contract
        [z\Qa-d]\E]
          ^

  The error fires at the first `\` inside `[...]`, before the
  `\Q` is recognized as a quoted-literal opener. PCRE2 by
  contrast has a dedicated production for `\Q...\E` inside a
  class and accepts the input.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0057/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0057/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0057/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  ~138 test cases across PCRE2 10.47 testdata depend on
  `\Q...\E` working inside a character class. Examples
  (deduplicated from the conformance failure dump):
  - `[z\Qa-d]\E]` — literal class members
  - `[ab\Q^$.|?*+(){}\E]+` — quoted metachars as literals
  - `[\Q]\E]` — literal `]` via quoted region
  - `[\Q\E]` — empty quoted region
  - `[\QXY\Eabc]` — mixed quoted + ordinary class items

  All currently fail RGX `Regex::compile` at PGEN's parse step
  with `E_PARSE_FAILURE`. Note: `\Q...\E` at atom position
  (outside char classes) was previously fixed in PGEN 1.1.21
  via the `quoted_literal` atom production; this report asks
  for the same treatment inside character classes.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.22"
  fixed_in_parser_backend_version: "9af9500"
  verified_at: 2026-04-15T00:00:00Z
  verification_notes: |
    PGEN 1.1.22 (commit 9af9500, "Fix PCRE2 short properties and
    class quotes") adds a new `class_item` alternative
    `quoted_class_literal` in `subs/pgen/grammars/regex.ebnf:114-121`:

      class_item = posix_class | quoted_class_literal | ...
      quoted_class_literal = "\Q" quoted_class_literal_char* "\E"
      quoted_class_literal_char = letter | digit | whitespace
                                | class_safe_special | ']' | unicode_char

    The body-char production explicitly allows `]` so a quoted `]`
    inside a class is no longer the class terminator.

    Verified by running
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '[z\Qa-d]\E]' /tmp/verify.json
    against the updated submodule. The emitted AST now contains a
    `quoted_class` node (previously `E_PARSE_FAILURE`).

    RGX adapter extended (rgx-core/src/parsing.rs) with a new
    `quoted_class_literal` branch in `convert_class_item` plus a
    `quoted_class_literal_chars` / `walk_quoted_class_body`
    helper pair — each body char becomes a `CharRange::single`
    appended to the enclosing class. ~138 affected PCRE2 cases now
    compile; conformance moved from 69.3% to 70.7%.

    One related issue remains open: bare `\E` inside `[...]`
    without a preceding `\Q` (e.g. `/^[\Eabc]/`) still reports
    `E_PARSE_FAILURE`. PCRE2 treats this as a literal `E` (the
    `\E` closes a not-yet-open quoted region). Track separately
    if it affects enough cases to warrant a report.
