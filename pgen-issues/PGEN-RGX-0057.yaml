id: PGEN-RGX-0057
summary: |
  PGEN regex parser rejects `\Q...\E` literal-quote sequences inside a character class with `E_PARSE_FAILURE: escape is not accepted inside a character class`. PCRE2 10.47 accepts these — `\Q...\E` inside `[...]` is the literal byte sequence between the delimiters added to the class, per pcre2pattern(3) §"Generic character types".
status: closed
