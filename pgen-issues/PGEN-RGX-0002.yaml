expected_behavior: |
  The published regex contract and user guide both list numeric backreferences such as \1 as accepted syntax.

  After successful parse, the AST dump should classify \1 as a backreference construct, consistent with named backreferences such as \k{name}.
actual_behavior: |
  The generated regex backend accepts (a)\1 successfully, but the AST dump routes \1 through:
  - escape
  - escape_unit
  - simple_escape
  - digit = "1"

  No backreference node appears for the numeric form.
reproduction: |
  Exact tracked reproducer bundle:
  - pgen-issues/artifacts/PGEN-RGX-0002/repro_input.txt
  - pgen-issues/artifacts/PGEN-RGX-0002/pgen_contract.json
  - pgen-issues/artifacts/PGEN-RGX-0002/pgen_parse_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0002/pgen_ast_dump_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0002/pgen_ast_dump.json
  - pgen-issues/artifacts/PGEN-RGX-0002/pgen_trace.log

  Key facts from the bundle:
  - repro_input.txt contains the exact bytes 28 61 29 5c 31 => "(a)\1".
  - pgen_contract.json reports supports_regex_generated_backend=true, regex_parser_release_version=1.1.0, and regex_integration_contract_version=1.1.0.
  - pgen_parse_outcome.json reports status=success with no diagnostic.
  - pgen_ast_dump.json shows the second piece starting at byte 3 as an escape node, not as a backreference node.

  Useful control check run against the same generated backend:
  - (?<A>a)\k{A} produces a backreference node in the AST dump.

  That control evidence suggests the problem is specific to numeric backreferences, not to all backreference forms.
impact: |
  RGX cannot distinguish numeric backreferences from ordinary escapes when consuming the published PGEN transport.

  Any downstream that relies on the AST dump to preserve backreference semantics will mis-handle numeric backreferences even though PGEN's public contract advertises them as supported syntax.
resolution:
  status: verified-fixed-upstream
