  verification_notes: |
    Re-verified against the local PGEN checkout at commit bd110c9c374f0bc1c5c8f8d5d508f5eb0f90cf77.
    parser_embedding_api_contract() now reports regex_parser_release_version=1.1.1 and regex_integration_contract_version=1.1.1.
    The same RGX-side repro now transports \1 as a backreference node instead of escape/simple_escape/digit.
