id: PGEN-RGX-0078
summary: |
  PGEN's `regex` parser parse-time at HEAD `056f6784` (release `1.1.40`,
  contract `1.1.42`) is **~360x slower than PCRE2's full no-JIT compile**
  and **~85x slower than PCRE2's full JIT-enabled compile**, geomean
  across the 8-pattern bench corpus inherited from PGEN-RGX-0073.
  PGEN's PRIMARY <50µs target was met at release `1.1.30` per PGEN's
  internal methodology (Apple M-series, mimalloc, 5000 samples / 200
  warmup) — but that target is NOT the closure criterion the RGX
  integration was filed for. The integration-side closure criterion
  is the PCRE2-relative ratio (RGX ROADMAP target: <5x of PCRE2
  compile), which is what 0078 tracks.

  This report is the methodology-correction follow-up to
  PGEN-RGX-0073:

  - **0073** filed an absolute-time complaint ("PGEN parse is in the
    ms range vs the PRIMARY <50µs target"). PGEN closed it at release
    `1.1.30` against that absolute target.
  - **0078** files the PCRE2-relative complaint ("PGEN parse is hundreds
    of times slower than PCRE2 compile, both measured on the same host,
    same build profile, same allocator"). The closure criterion is
    explicit: geomean PGEN-parse / PCRE2-compile ratio under 5x.
  - The two reports cover the same bench corpus and the same overall
    perf concern, with 0078 introducing the RGX-integration-aligned
    measurement metric. 0073's resolution block carries a forward
    pointer to 0078 since the integration-side concern remained open
    after 0073's PGEN-side closure.

  Bug class: **pathological performance or resource usage** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4).

  Beyond filing the gap, this report **provides PGEN with a
  self-contained iteration flow** — a vendorable `pgen_iteration_flow/`
  directory with the standalone C baselines, a self-contained Rust
  microbench, integration snippets for PGEN's Cargo.toml and Makefile,
  and a one-shot driver script — so PGEN can run the same
  PCRE2-relative measurement on every release without depending on
  RGX. See `pgen_iteration_flow/README.md` for the full recipe.

