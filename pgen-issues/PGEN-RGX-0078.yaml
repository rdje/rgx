# === Verification checklist for closure ===
verification:
  - Geomean PGEN parse / PCRE2-no-JIT compile ratio drops to <5x on
    the 8-pattern corpus, measured on the same host with the same
    allocator on both sides. (Closure target.)
  - Per-pattern PGEN/PCRE2-no-JIT ratios all under 10x. (Quality
    check — geomean < 5x is consistent with one outlier at ~8x and
    the rest under 4x; uniform sub-5x is the "all green" form.)
  - Verify by running `pgen_iteration_flow/run_perf_gate.sh` on
    PGEN's own host (no RGX checkout required) and attaching the
    output to this report's resolution block. The unified ratio
    table format is stable across runs so the verification reduces
    to a diff against a previous baseline.
  - Optional: cross-validate the Rust-microbench numbers against the
    C-bench numbers on the same host. They should agree within ±5%
    on PCRE2 compile timings; if they diverge, file a separate
    pcre2-Rust-binding-overhead concern (out of scope here).

  resolution_path_options:
    - **Specialised codegen for the regex grammar** (most likely
      route per the analysis). Bypass PGEN's general-purpose
      EBNF-driven codegen for the regex grammar specifically; emit
      a hand-tuned recursive-descent parser that matches the
      semantics of the published shape. Could be limited to the
      `regex` profile, leaving the SystemVerilog / VHDL grammars
      on the general path.
    - **General-purpose codegen wins of order-of-magnitude scale**
      that aren't allocator-bound. Less likely given the structural
      argument (PGEN parse < PCRE2 compile structurally, yet runs
      slower), but possible if the bottleneck is concentrated in a
      few hot paths that profile-guided rewrites can collapse.
    - **Diagnostic outcome**: PGEN team determines the
      general-purpose architecture cannot reach <5x without
      specialised codegen, and the specialised-codegen project is
      explicitly out of scope for the regex grammar. In that case
      0078 closes with a forward reference to the
      out-of-scope-decision and RGX's ROADMAP "<5x of PCRE2 compile"
      target gets retired.

# === Why this is filed despite PGEN's 0073 "perf closure" ===
relationship_to_pgen_rgx_0073:
  description: |
    PGEN-RGX-0073 was filed against PGEN's absolute parse-time
    target ("<50µs PRIMARY"). PGEN's release `1.1.30` met that target
    on PGEN's mimalloc-based methodology and PGEN closed 0073 against
    that criterion. That closure was correct on PGEN's chosen
    metric — but the integration-side concern (PGEN parse vs PCRE2
    compile, the comparison that bounds RGX's achievable
    `Regex::compile` time vs PCRE2) was not the metric 0073 closed
    against.

    0078 is the methodology-correction follow-up. It states the
    integration-side metric explicitly (PCRE2-relative ratio) and
    provides PGEN with a self-contained measurement tool that can
    be wired into PGEN's release-gate suite. The intent is NOT to
    re-open 0073 — that remains validly-closed on PGEN's metric.
    The intent is to track the integration-side concern under a
    distinct ID with a distinct closure criterion.

    PGEN's release-note p50s in future releases should ideally
    include both metrics (absolute PGEN parse time + PCRE2-relative
    ratio) so PGEN's downstream consumers can map closure against
    whichever metric matches their integration goal.

impact: |
  ## Direct impact on RGX

  This is a **performance bug** affecting RGX users via
  `Regex::compile` wall-clock time. Concretely:

  - `Regex::compile("test")` on this host takes ~100µs total. PCRE2
    compiles "test" in ~350ns. RGX is **~290x slower** end-to-end.
  - The 4-14% RGX-side share of the compile budget (lazy artifact
    construction, AC dispatch, multi-byte memmem prefilter, etc., all
    shipped in the 2026-04-25 → -27 perf sprint) is essentially
    irrelevant — even if RGX-side compile work went to zero, PGEN
    parse alone would still leave RGX at 270x slower than PCRE2.
  - The ROADMAP "<5x of PCRE2 compile" target is unreachable until
    PGEN parse drops to ~1.7-5.8µs per pattern (a 20-100x PGEN-side
    speedup from current numbers).

  Concretely-affected RGX surfaces:

  - **One-shot CLI invocations** (`rgx 'pattern' input` style) — the
    entire compile cost is paid on every invocation. Measurable UX
    gap vs grep-with-PCRE2.
  - **First compile of any pattern** — RGX's `RegexCache` (B3) only
    helps after a hit; the first miss pays the full PGEN parse cost.
  - **Hot-loop pattern construction** — code that compiles patterns
    per-iteration (e.g. dynamic regex from user input) pays the full
    PGEN parse cost per iteration.

  ## Why it lands as a PGEN issue, not an RGX one

  RGX's `CLAUDE.md` codifies a hard rule: "PGEN is the sole parser.
  No builtin parser fallback." And `feedback_no_pgen_workarounds.md`
  explicitly says: "If PGEN's parser is wrong (...), file a PGEN
  report per the cluster-first protocol; never add RGX adapter code
  to absorb malformed output." The same discipline applies to perf:
  if PGEN parse is the bottleneck, the fix lands in PGEN.

  The structural argument also bounds what RGX can do alone: PGEN
  parse is currently 86-96% of total `Regex::compile` time. RGX's
  remaining 4-14% is small enough that any RGX-side optimization
  has bounded ceiling impact. The dominant lever is on PGEN's side.

  ## Severity assessment

  **Medium-to-high** — affects every RGX user's compile path. Not a
  correctness issue (parser is correct, just slow) so the bug
  classification is "pathological performance" per protocol §4
  rather than "wrong AST". Severity is held below "critical" only
  because it's a perf concern with an existing workaround for
  steady-state workloads (`RegexCache` amortizes after the first
  miss); first-compile-of-pattern workloads pay the full cost.

  ## Comparison with PGEN-RGX-0073

  - **0073 (severity unchanged)**: filed PGEN-internal-target absolute
    complaint. Closed by PGEN at release `1.1.30` per PGEN's metric.
    Forward-pointer in 0073's resolution block points here.
  - **0078 (this report)**: methodology-correction follow-up. Same
    perf concern, integration-side metric, distinct closure
    criterion. Provides self-contained PGEN-side iteration tooling.

