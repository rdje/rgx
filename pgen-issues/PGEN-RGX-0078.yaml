      - CPU/OS: Apple M4 Pro / macOS 25.4.0 / arm64. See
        `measurements/host_metadata.txt`.
      - Slowdown class: corpus-wide, deterministic, weakly
        size-correlated (so a single fast pattern won't accidentally
        close the gap; the architecture has structural overhead).

# === Family expected vs actual behavior ===
expected_behavior: |
  Per the RGX ROADMAP "Performance: close the PCRE2 compile-time gap
  to <5x" entry, the integration-side closure criterion is:

      geomean PGEN parse / PCRE2 compile (no JIT) ratio < 5x

  on the 8-pattern bench corpus, on the same host, on the same build
  profile (release).

  Concretely, with PCRE2-no-JIT compile p50s of 346ns-1156ns on this
  host, PGEN parse would need to land at p50s of ~1.7µs-5.8µs per
  pattern — a 50-180x speedup from the current 92µs-377µs.

  PGEN's release `1.1.30` "perf closure" claimed PGEN parse p50s of
  13µs-76µs per pattern (PGEN's internal mimalloc-based methodology),
  which is closer to the target but still 30-200x from PCRE2-no-JIT
  on the same host. So even reproducing PGEN's release-note p50s
  (which RGX has not been able to do on the default-allocator path)
  would not close the integration gap.

  The path to closure likely requires either (a) specialised codegen
  for the regex grammar (PGEN's tracker mentions this as long-term)
  or (b) constant-factor wins in PGEN's general-purpose
  EBNF-driven codegen of an order-of-magnitude scale, beyond what
  allocator tuning can deliver.

actual_behavior: |
  PGEN parse measured at 92µs-377µs p50 across the corpus;
  PCRE2-no-JIT compile at 346ns-1156ns p50 on the same host. Ratio
  table per pattern (live measurement, 2026-05-01, PGEN pin
  `056f6784`):

  | Pattern | PGEN parse p50 | PCRE2 no-JIT p50 | PCRE2 +JIT p50 | PGEN/no-JIT | PGEN/+JIT |
  |---|---:|---:|---:|---:|---:|
  | literal_simple     |  92,042 ns |    346 ns | 2,305 ns | **266x** |  **40x** |
  | digit_sequence     | 216,833 ns |    682 ns | 2,483 ns | **318x** |  **87x** |
  | character_class    | 266,584 ns |  1,156 ns | 2,799 ns | **231x** |  **95x** |
  | alternation        | 119,709 ns |    463 ns | 1,896 ns | **259x** |  **63x** |
  | capture_groups     | 265,000 ns |    685 ns | 2,468 ns | **387x** | **107x** |
  | url_simple         | 196,292 ns |    370 ns | 1,776 ns | **530x** | **111x** |
  | email_basic        | 213,292 ns |    389 ns | 2,372 ns | **548x** |  **90x** |
  | anchor_complex     | 377,209 ns |    766 ns | 3,079 ns | **492x** | **123x** |
  | **geomean**        |   ~218,000 ns | ~605 ns | ~2,400 ns | **~360x** | **~85x** |

  Reading:
  - **PGEN parse alone is ~360x slower than PCRE2's full no-JIT
    compile**, even though PCRE2 compile does strictly more work
    (parse + bytecode codegen + match metadata). PGEN parse is a
    structural subset of PCRE2 compile, yet runs hundreds of times
    slower.
  - **Even compared to PCRE2 with JIT enabled** (which adds
    `pcre2_jit_compile(PCRE2_JIT_COMPLETE)` on top), PGEN parse is
    still 40-123x slower (geomean ~85x). This rules out "JIT
    inclusion" as a fairness explanation — PGEN's parse alone is
    slower than the most-loaded PCRE2 compile mode by an
    order-of-magnitude.
  - **Methodology gap with PGEN's `1.1.30` release notes**: PGEN
    claimed 13-76µs p50 with mimalloc + 5000 samples + 200 warmup.
    RGX's measurement uses the default macOS allocator + same sample
    count. The 4-7x slowdown observed here vs PGEN's release-note
    p50s is almost certainly the allocator gap. Adopting `mimalloc`
    on RGX side would close that — but would still leave geomean
    ~50x against PCRE2-no-JIT (10x over the closure target).
  - **The bottleneck is structural, not constant-factor**. PCRE2
    compiles faster than PGEN parses despite doing strictly more
    work. PGEN's general-purpose EBNF-driven codegen has overhead
    that the regex grammar exposes acutely.

