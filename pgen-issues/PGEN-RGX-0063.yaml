id: PGEN-RGX-0063
summary: |
  PGEN regex parser rejects the PCRE2 POSIX-style word-boundary class names [:<:] (word start) and [:>:] (word end) with "unknown POSIX character class name". PCRE2 10.47 accepts these — testoutput2:13793 shows the bytecode compiles to `\b Assert \w Ket` for [:<:] (a zero-width assertion that the next code unit is a word char after a word boundary).
status: closed
opened_at: 2026-04-16T00:00:00Z
first_seen_at: 2026-04-16T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

