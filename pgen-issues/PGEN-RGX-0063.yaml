context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0063/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0063/pgen_trace.log
  pattern: "[[:<:]]red[[:>:]]"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput2` line 4057. PCRE2 10.47
    accepts the PCRE2 POSIX-alias word-boundary class names
    `[:<:]` (word-start) and `[:>:]` (word-end). Verified via
    testoutput2:13793 bytecode dump for `/[[:<:]]red[[:>:]]/B`:
        Bra / \b / Assert / \w / Ket / red / \b / Assert back
                            ^^^^                ^^^^^^^^^^^^^
        / 1 Reverse / \w / Ket / …
    [:<:] compiles to `\b` followed by a zero-width lookahead
    assertion of `\w`, and [:>:] compiles to a `\b` preceded by
    a zero-width lookbehind of `\w`. Affects 3 testinput2
    patterns.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept `[:<:]` and `[:>:]` as valid `posix_class`
  names in addition to the POSIX-standard names (`alpha`,
  `digit`, etc.). These two are PCRE2-specific POSIX aliases
  documented in pcre2pattern(3) §"POSIX character classes" as
  inherited from Perl's legacy regex syntax:
    [:<:]  — word-boundary before a word character (==
              `\b(?=\w)` or equivalently the start-of-word
              assertion).
    [:>:]  — word-boundary after a word character (==
              `(?<=\w)\b` or end-of-word).

  Suggested grammar amendment in `subs/pgen/grammars/regex.ebnf`:
  extend `posix_name` with the two literal names `<` and `>`,
  or add a dedicated `pcre2_word_boundary_posix` alternative
  parallel to `posix_class` with these two entries.

actual_behavior: |
  PGEN rejects the pattern with:
        regex compile error: E_PARSE_FAILURE: unknown POSIX character class name
        [[:<:]]red[[:>:]]

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0063/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0063/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0063/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  3 testinput2 patterns use these POSIX-alias word-boundary
  names and currently fail RGX `Regex::compile` at PGEN parse:
    [[:<:]]red[[:>:]]
    [[:<:]]+red
    red[[:>:]]+
  Fix unlocks them via the expected-behavior grammar
  amendment.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.25"
  fixed_in_parser_backend_version: "ffd61e9"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.25 (commit ffd61e9, "regex: publish RGX 0063 0064
    maintenance release") adds a dedicated
    `posix_word_boundary_alias = "[[:<:]]" | "[[:>:]]"` atom
    as a new alternative in the atom production, alongside
    `escape | char_class | …`.

    Verified:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '[[:<:]]red[[:>:]]' /tmp/v.json
    → status=success; AST contains `posix_word_boundary_alias`
    nodes for both `[:<:]` and `[:>:]`.

    RGX adapter (`rgx-core/src/parsing.rs::convert_atom`)
    extended with a `posix_word_boundary_alias` dispatch that
    lowers:
      [[:<:]] → Sequence(WordBoundary, Lookahead(Word))
      [[:>:]] → Sequence(Lookbehind(Word), WordBoundary)
    matching PCRE2 bytecode `\b Assert \w Ket` exactly.
