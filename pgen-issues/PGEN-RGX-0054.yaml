id: PGEN-RGX-0054
summary: |
  PGEN's pgen-generated-regex worker thread overflows its 8 MiB stack
  and aborts the process (SIGABRT) when parsing a pattern with 80
  levels of nested parentheses. The pattern comes from PCRE2
  testinput2 line 4674 and is a deliberate depth stress-test.
status: closed
opened_at: 2026-04-13T00:00:00Z
first_seen_at: 2026-04-13T00:00:00Z
last_updated_at: 2026-04-13T00:00:00Z

# === Parser identity (per PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md §1) ===
parser_backend: pgen
parser_backend_version: "8783757"
parser_release_version: "1.1.10"
integration_contract_version: "1.1.10"
parser_family: regex
profile: regex_default
integration_surface: parseability_probe
generated_artifact: "PGEN submodule subs/pgen, embedded via rgx-core/src/parsing.rs"

# === Host project identity (per protocol §2) ===
host_project: rgx
rgx_commit: 87670fa
host_os: macos
host_arch: aarch64
rust_toolchain: "rustc per workspace rust-version = 1.88"
cargo_features: "default + pgen-parser"

upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0054/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0054/pgen_trace.log
  pattern: "((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((x))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))))\\80"
  source: |
    Discovered by the RGX PCRE2 conformance harness while scanning
    `subs/pcre2/testdata/testinput2` near line 4674. PCRE2 10.47 parses
    and matches this pattern in its own pcre2test harness; the RGX
    conformance harness and the `file_pgen_issues` generator both
    abort (SIGABRT) when PGEN attempts to parse it. The crash is
    reproducible with any of the embedding-API entry points:
    `parse_grammar_profile_named`, `parse_grammar_profile_ast_dump_named`,
    and by extension `Regex::compile` in RGX. The abort is unrecoverable
    in-process — `std::panic::catch_unwind` does not intercept it.

# === Bug class (per protocol §4) ===
bug_class: panics_or_crashes

expected_behavior: |
  PGEN should parse 80 levels of nested parentheses without
  aborting. PCRE2 accepts this pattern and the corresponding
  testinput2 block (line 4674) expects a successful match against
  subject `"xY"` (trailing `Y` is the subject body for the
  backreference test). Either:
  (a) raise the `GENERATED_REGEX_WORKER_STACK_BYTES` default high
      enough to absorb reasonable nesting depths (PCRE2 allows up to
      the millions-of-nested-groups territory with an iterative
      parser), or
  (b) rewrite the relevant recursive-descent productions as iterative
      loops with an explicit parse stack, or
  (c) detect the depth bound before recursing and return a
      structured `E_PARSE_FAILURE` with a documented depth diagnostic.

actual_behavior: |
  Calling `pgen::embedding_api::parse_grammar_profile_named("regex",
  "regex_default", pattern)` with the repro input spawns PGEN's
  "pgen-generated-regex" thread (with an 8 MiB stack configured via
  `GENERATED_REGEX_WORKER_STACK_BYTES`), the thread recurses through
  its grammar productions for every opening `(`, and at some depth
  between 20 and 80 it exhausts the stack. The Rust runtime prints:
      thread 'pgen-generated-regex' has overflowed its stack
      fatal runtime error: stack overflow, aborting
  followed by SIGABRT (signal 6). The process exits immediately;
  there is no structured `ParseOutcome` captured.

  The abort is reproducible both via the in-process embedding API
  and via the standalone `parseability_probe` binary.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0054/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — placeholder noting the abort (no
      structured outcome could be captured because the process dies)

  Reproduction command (from rgx repo root) — captures the trace up
  to the abort point:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0054/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0054/pgen_trace.log

  Expected: `parseability_probe` either accepts the input or returns
  a structured depth-exceeded error.
  Actual: the child process aborts via stack overflow.

impact: |
  Any downstream project that lets untrusted input reach PGEN's
  regex parser can be DOS'd by a pattern with ~80 nested groups.
  RGX can partially mitigate by pre-filtering at the adapter layer
  (it currently refuses to attempt `Regex::compile` on >= 80 leading
  parens in the conformance harness skip list), but the underlying
  bug is in PGEN. Until PGEN ships a fix, any RGX user who accepts
  regex patterns from outside their trust boundary is exposed.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.21"
  fixed_in_parser_backend_version: "e617960"
  verified_at: 2026-04-14T00:00:00Z
  verification_notes: |
    PGEN 1.1.21 (commit e617960, "Align regex parser with PCRE2
    source audit") fixed the recursive-descent stack-overflow on
    80-level group nesting after a thorough audit of PCRE2's
    src/pcre2_compile.c source. Verified by running Regex::compile
    on pgen-issues/artifacts/PGEN-RGX-0054/repro_input.txt against
    the new submodule pin: the pattern now compiles without the
    "pgen-generated-regex has overflowed its stack" abort it
    produced on PGEN 1.1.19 and earlier.

    The 80-leading-parens skip guard has been removed from
    rgx-core/tests/pcre2_conformance.rs and
    rgx-core/src/bin/file_pgen_issues.rs — the guard is no longer
    needed.
