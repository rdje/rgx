impact: |
  ## Direct impact on RGX

  RGX's `Regex::compile` is currently 1083-1971x slower than PCRE2
  on the standard bench corpus (`target/benchmark-trends/latest.md`
  rows for `compile`). Phase-splitting (this report) shows that
  reducing the post-PGEN work to *zero* would only buy a 1.2-1.5x
  total-compile speedup, leaving RGX 700-1500x slower than PCRE2.
  This makes any "<5x of PCRE2 compile" target unreachable by
  RGX-side work alone.

  Concretely affected RGX surfaces:

  - **A8 crate publishing readiness** — the user-facing publish
    blockers tracked in `ROADMAP.md` § Tier-2 and `docs/BACKLOG.md`
    § A8. If `cargo install rgx-cli` users hit ~1ms compile on
    every pattern, the experience is materially worse than `grep`.
  - **One-shot CLI invocations** (`rgx 'pattern' input` style) —
    the entire ~1ms is paid on every CLI call. PCRE2-backed grep
    variants pay ~1µs.
  - **Compilation cache hit-rate-dependent workloads** — RGX has a
    `RegexCache` (B3, shipped) but the *first* compile cost is
    unaffected.
  - **Long-tail variance** — `capture_groups` p99/p50 ratio is
    3.1× and max/p50 ratio is 13.1×; this implies a pathological
    branch in PGEN's parse path, not just steady-state slowness.

  ## Why it lands as a PGEN issue, not an RGX one

  RGX's `CLAUDE.md` codifies a hard rule: `PGEN is the sole parser.
  No builtin parser fallback.` Adding a fast-path inside RGX would
  violate that rule and create a second source of regex-grammar
  truth (correctness risk: two parsers that disagree on edge
  cases). The accuracy-preserving fix space is therefore entirely
  on the PGEN side:
    1. Profile-guided perf work on PGEN's regex-grammar parse hot
       path (the goal of this report).
    2. AST-shape compaction (the 60KB-AST observation suggests
       intermediate nodes that aren't being flattened).
    3. Allocation reduction in the parse loop (the long-tail
       p99/max suggests allocator pressure).
    4. Specialised codegen for "leaf grammars" like regex (a
       larger PGEN-side architectural change — out of scope for
       this report, mentioned only as a reference for what a 10x
       jump would look like).

  Per the same rule, the 8 RGX-side techniques surveyed in
  `ROADMAP.md` § "Performance: close the PCRE2 compile-time gap to
  <5x" remain valid follow-up work even after this PGEN issue is
  resolved — they keep the RGX-side share of total compile from
  growing back up to dominance once PGEN improves.

  ## Why this is **not** a correctness issue

  - PGEN's parse output is correct on every pattern measured.
    AST dumps match RGX's expectations; the PCRE2 conformance
    ratchet is unaffected (`pass=12709 / fail=101 / panic=0 /
    skip=0` at RGX commit c3104ae, captured today after the
    measurement run).
  - RGX's existing 1,077 lib tests + 30 cli tests all green at
    measurement time.
  - This is a pure **wall-clock** issue under bug class
    "pathological performance or resource usage".

resolution:
  status: unresolved
  fixed_in_rgx_commit: null
  verified_at: null
  verification_notes: |
    Resolution criteria (any one):
    1. **Primary**: PGEN regex-grammar parse median drops to
       <50µs across the 8-pattern benchmark — that's a 8-50x
       PGEN-side speedup, which would put PGEN at ~10-15% of
       RGX's compile budget and make the rest of the budget
       attackable by RGX-side techniques.
    2. **Acceptable interim**: PGEN regex-grammar parse median
       drops to <200µs (a 2-12x PGEN-side speedup). Would make
       RGX-PCRE2 compile gap tractable to ~50-100x rather than
       1000x+.
    3. **Diagnostic outcome**: PGEN team determines the
       general-purpose EBNF-driven architecture cannot reach
       the targets above without specialised codegen, in which
       case this issue is closed with a forward reference to
       the specialised-codegen project (currently hypothetical).

    Verification: re-run the bundle in
    `artifacts/PGEN-RGX-0073/` against the new PGEN release
    pin, attach the new measurement output here, and update
    `RUST_CODEBASE_ANALYSIS.md` § perf section + ROADMAP entry.
