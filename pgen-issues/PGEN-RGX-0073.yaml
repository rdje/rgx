id: PGEN-RGX-0073
summary: |
  PGEN's `regex` parser is 1300-4700x slower than PCRE2's full
  compile pipeline (parse + codegen + JIT prep) on a representative
  set of 8 ordinary regex patterns. Median wall-clock parse time
  ranges from 405µs (`test`) to 2.49ms (`^(\d+)\s+(?P<word>\w+)
  \s+(?:foo|bar)$`); PCRE2-10.46 compiles the same patterns in
  142-890ns end-to-end. PGEN's parse step alone consumes 65-99% of
  RGX's total `Regex::compile` budget. This is the dominant
  bottleneck for RGX's compile-time gap to PCRE2; downstream
  optimisation work in RGX (lazy artifact construction, skip-
  when-unused, defer-JIT, allocation cleanup) targets only the
  remaining 1-35% of the budget and cannot meaningfully close the
  gap without a PGEN-side perf fix.

  Bug class: **pathological performance or resource usage** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4). Parse output is
  correct on every measured pattern; only wall-clock time is at
  issue.

