# Performance-related §D fields (per PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md §D).
performance_context:
  bug_class: pathological_performance
  scope: corpus_wide              # not deterministic on one sample; reproduces on all 8 patterns
  shape: median_steady_state      # plus long-tail variance on 2/8 patterns (capture_groups, url_simple)
  trace_disabled_for_perf_runs: true   # cargo run --release builds without `--features trace`
  measurement_methodology: |
    - 1000 samples per pattern after 50 warmup iterations
    - release build (`cargo build --release`)
    - `parsing::parse_pattern` timed in isolation via `Instant::now()`
    - independent `Regex::compile` control measurement (also 1000 samples)
    - PCRE2 baseline via batched 10,000-compile loop, total / N average
  variance_observation: |
    `capture_groups` and `url_simple` show p99/p50 ratios of 3.1× and
    4.4× respectively, with maxes at 13.1× and 6.2× of p50. The other
    six patterns are tightly clustered (p99/p50 < 1.3×). Suggests
    occasional pathological branch in PGEN's parse path on these two
    shapes — possibly allocator contention, possibly a specific grammar
    rule with unbounded backtracking under certain inputs. Worth
    PGEN-side flamegraph attention.
  input_byte_sizes_per_pattern:
    literal_simple: 4
    digit_sequence: 17
    character_class: 46
    alternation: 12
    capture_groups: 23
    url_simple: 13
    email_basic: 16
    anchor_complex: 38
  ast_dump_size_observation: |
    `email_basic.txt` (16 input bytes) → `email_basic_ast.json`
    of 60,506 bytes / 861 lines. Input/output size ratio ≈ 3,800×.
    Deeply nested `Alternative`/`Sequence`/`Quantified` wrappings
    around every leaf. Likely correlated with parse time but not
    proven; included as a hypothesis for the perf root cause.

upstream_report:
  reported: false
