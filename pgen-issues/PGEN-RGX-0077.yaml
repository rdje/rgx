# === Verification checklist for the fix ===
verification:
  - For `\Qab*\E{2,}`, `pattern[0][0]` should be a 3-element
    flat array: `[<piece-a>, <piece-b>, <piece-*-with-{2,}>]`.
  - For `\Qabcdef\E+`, `pattern[0][0]` should be a 6-element
    flat array.
  - For `\Qab\E{1,3}`, `pattern[0][0]` should be a 2-element
    flat array `[<piece-a>, <piece-b-with-{1,3}>]`.
  - All 11 affected family rows from the table above should
    convert from `[[<N pieces>]]` to `[<N pieces>]`.
  - Degenerate cases (`\Qa\E{3}`, `\Q\E{2}`) and control cases
    (`"hello"`, `"a"`) should remain byte-identical pre/post
    fix.
  - RGX's PCRE2 conformance ratchet should restore to
    `PASS_BASELINE = 12_709` (or higher, if the fix recovers
    additional cases the bug was masking).
  - A new regression-lock test similar to
    `regex_parser_pgen_rgx_0075_multi_piece_concatenation_surfaces_all_pieces`
    should be added in `rust/src/embedding_api.rs` covering
    the canonical `\Qab*\E{2,}` case (plus `\Qabc\E?` as a
    second pin) so the bug cannot return without the test
    failing.

# === Family observations beyond the primary cluster ===
broader_concerns:
  description: |
    The bug points at a class of `**` flatten-spread evaluation
    paths that may have other unfixed cases. Flagging these
    here so PGEN can audit whether a single broader fix to the
    spread evaluator covers more ground than the regex-grammar
    repair.
  related_paths:
    - Any annotated rule of the form `parent = child+ -> [$1**]`
      where one of `child`'s alternatives carries an
      array-returning annotation. The regex grammar has
      `concatenation` as the most prominent such site, but
      similar patterns may exist in the SystemVerilog or VHDL
      grammars depending on their annotation choices.
    - Future regex slices that introduce additional
      array-returning annotations on `atom` alternatives (per
      task #40 atom-subtree campaign) could re-surface the same
      issue if the spread evaluator isn't fixed at the codegen
      level.

impact: |
  ## Direct impact on RGX

  This is a **medium-severity** bug for RGX integration. Every
  pattern containing a `\Q...\E quantifier?` matched run with
  ≥2 chars + a quantifier produces an AST whose corresponding
  concat position carries an extra array wrap. RGX's typed
  walker surfaces:

      pgen AST contract mismatch: expected typed piece object, got array

  The PCRE2 conformance ratchet at `PASS_BASELINE = 12_709`
  drops to ~12,693 against this PGEN pin (delta of -16 cases),
  isolated to testinput1:6794 `/\Qab*\E{2,}/` plus its sibling
  cases in the same family.

  There is also one degenerate cascade case under conditional
  callout-prefix assertions (`(?(?C99)(?=...)...)`) — that's a
  separate walker-side gap (no dedicated AST shape needed,
  just a missing dispatch arm) and tracked elsewhere as RGX
  follow-up work, not as a PGEN bug.

  ## Why it lands as a PGEN issue, not an RGX one

  RGX's `CLAUDE.md` codifies a hard rule: "PGEN is the sole
  parser. No builtin parser fallback." And
  `feedback_no_pgen_workarounds.md` explicitly says: "If
  PGEN's parser is wrong (wrong AST / rejects valid / accepts
  invalid), file a PGEN report per the cluster-first protocol;
  never add RGX adapter code to absorb malformed output."

  An RGX-side workaround that detected the extra wrap and
  unwrapped it would (a) violate that rule, (b) become dead
  code once PGEN ships the fix, and (c) accidentally absorb
  any future shape change PGEN intends. So we report upstream
  and wait.

  ## Severity assessment

  **Medium** — affects a well-defined class of patterns
  (`\Q...\E quantifier?` with ≥2-char run). The bug surface
  is narrow, the documented expected shape is unambiguous
  (per the 0074 contract description and the regex_parser_book
  worked example), and the fix is localised to the `**`
  flatten-spread codegen in `ast_return_transform.rs` (same
  file as the 0075 fix).

  ## Comparison with PGEN-RGX-0075 and PGEN-RGX-0076

  - **0075 (critical)**: silent data loss in concatenation
    (`$1` peeled the first element, dropping the rest).
    Symptom: every multi-piece pattern affected; every
    downstream consumer broken catastrophically.
  - **0076 (medium)**: name-loss in `posix_class` annotation
    (`-> $1` extracted only the literal `[:` opener). Symptom:
    POSIX classes inside `[...]` indistinguishable.
  - **0077 (medium)**: wrap-by-one regression on
    `piece_quoted_run_quantified` array spread. Symptom:
    every multi-char `\Q...\E quantifier?` pattern surfaces an
    extra array wrap in the concat position.

  All three fixes are local to the codegen / annotation in
  PGEN's regex grammar. None requires structural changes in
  the embedding API or AST schema.

resolution:
  status: fixed-upstream
  fixed_in_pgen_release: "1.1.40"
  fixed_in_pgen_commit: "056f6784"
  fixed_in_rgx_commit: null
  verified_at: 2026-05-01T00:00:00Z
  verification_notes: |
    PGEN 1.1.40 (`056f6784`) "PGEN-RGX-0077: `[$1**]` flatten-spread
    peels Alternative" fixed the FlattenSpread codegen in
    `rust/src/ast_pipeline/ast_return_transform.rs` — now peels
    `Alternative` recursively before inspecting child content for the
    unwrap decision, and adds a `Json(Array(_))` arm as preventative
    coverage for any future array-returning annotation. PGEN added a
    regression-lock test
    `regex_parser_pgen_rgx_0077_quoted_run_quantified_pieces_flat_in_concatenation`
    pinning the family-table shapes from this report. Verified
    end-to-end via the same `pgen_quoted_run_dump.rs` probe — every
    multi-char `\\Q...\\E quantifier?` case now produces a flat
    `[<N pieces>]` array at `pattern[0][0]` instead of the wrapped
    `[[<N pieces>]]`.
