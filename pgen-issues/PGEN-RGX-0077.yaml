id: PGEN-RGX-0077
summary: |
  PGEN's `regex` parser at HEAD `93f44d93` produces a typed AST
  in which a `concatenation = piece+ -> [$1**]` flatten-spread
  fails to unwrap arrays returned by
  `piece_quoted_run_quantified`. The result is one extra layer
  of array nesting around the pieces from any `\Q...\E
  quantifier?` matched run. The parse SUCCEEDS, the outer span
  covers the full input, but the typed shape at
  `pattern[0][0]` becomes `[[<pieces>]]` (1-element array
  containing the pieces array) instead of the documented flat
  `[<pieces>]`.

  The bug is an adjacent regression to PGEN-RGX-0075
  (multi-piece concatenation drop) on a different code path.
  PGEN-RGX-0075 fixed the `$1`-on-Quantified auto-peel codegen
  in three sites; this report's bug suggests the same family of
  spread-evaluation logic is incomplete for the case where one
  element of the `piece+` Quantified is itself an array (the
  `piece_quoted_run_quantified` branch's `[$2**, ...]`
  annotation produces a `Json(Array(<piece-objects>))` value).

  Per the documented `**` flatten-spread semantics in
  `subs/pgen/docs/regex_parser_book/src/parse-content-variants.md`
  and `rules-piece.md`:

  > "The `**` flatten-spread operator on `$1` (the `piece+`
  > Quantified) iterates each piece node and, if any piece's
  > content is itself a Sequence (e.g. from the
  > `piece_quoted_run_quantified` branch which produces
  > `Sequence([prefix-pieces..., last-piece-with-quantifier])`),
  > unwraps one level so the children appear inline."

  And per the PGEN-RGX-0074 fix description (release 1.1.31 /
  contract 1.1.33):

  > "Family-table proof, all matching PCRE2 semantics:
  > `\Qab*\E{2,}` -> 3 pieces (a, b, *{2,})"

  Empirically, `\Qab*\E{2,}` produces `pattern[0][0] = [[<3
  pieces>]]` (NOT `[<3 pieces>]`). The 3 pieces ARE present —
  the piece data is correct; the bug is purely in the wrapping
  level. Compare with the simple multi-piece concatenation
  case `"abc"` which correctly produces `pattern[0][0] = [<3
  pieces>]` (no extra wrap).

  Bug class: **parses but returns the wrong AST/dump** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4). The parser
  does not error or panic; it emits a typed AST with one extra
  level of structural nesting that downstream consumers cannot
  safely unwrap (since they cannot tell "1 piece by design"
  from "N pieces wrongly wrapped to 1 by the bug").

  Impact on RGX: every pattern containing a `\Q...\E
  quantifier?` matched run produces an AST whose corresponding
  position in `pattern[0][0]` carries an extra array wrap.
  RGX's typed-shape walker surfaces this as:

      pgen AST contract mismatch: expected typed piece object, got array

  The PCRE2 conformance harness drops by ~16 cases against the
  `PASS_BASELINE = 12_709` ratchet (testinput1:6794
  `/\Qab*\E{2,}/` plus sibling cases in the same family).

