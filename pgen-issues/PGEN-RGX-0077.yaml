# === Family expected vs actual behavior ===
expected_behavior: |
  Per `subs/pgen/docs/regex_parser_book/src/rules-piece.md`
  worked example for `\Qab*\E{2,}`:

      "pattern": [
        [[
          { "atom": "a", "quantifier": [],                          "type": "piece" },
          { "atom": "b", "quantifier": [],                          "type": "piece" },
          { "atom": "*", "quantifier": [<counted_quantifier-{2,}>], "type": "piece" }
        ]],
        []
      ]

  Equivalently: `pattern[0][0]` is the FLAT array of 3 piece
  objects, identical to what `concatenation = piece+ -> [$1**]`
  produces for any other 3-piece input (e.g. `"abc"` or
  `"ab*"`). The `piece_quoted_run_quantified` branch's array
  output is supposed to be unwrapped one level by the parent
  `**` flatten-spread, per the documented semantics.

  And per the PGEN-RGX-0074 family table:

  | source          | expected pieces        |
  |-----------------|------------------------|
  | `\Qab*\E{2,}`   | a, b, `*{2,}`         |
  | `\Qab*\E{2}`    | a, b, `*{2}`          |
  | `\Qab*\E?`      | a, b, `*?`            |
  | `\Qabc\E{2}`    | a, b, `c{2}`          |
  | `\Qab\E{3}`     | a, `b{3}`             |
  | `\Qa\E{3}`      | `a{3}` (degenerate)   |
  | `\Q\E{2}`       | empty (degenerate)    |

  The non-degenerate rows should each produce their N pieces
  flat in `pattern[0][0]`.

actual_behavior: |
  PGEN's typed AST adds **one extra wrapping layer** around the
  pieces from any matched `piece_quoted_run_quantified` arm.
  Empirically:

  | source          | observed `pattern[0][0]` shape       | expected `pattern[0][0]` shape   |
  |-----------------|-------------------------------------|-----------------------------------|
  | `\Qab*\E{2,}`   | `[[<3 pieces>]]` (1-elem wrap)      | `[<3 pieces>]` (flat)            |
  | `\Qabc\E?`      | `[[<3 pieces>]]`                    | `[<3 pieces>]`                   |
  | `\Qab\E{3}`     | `[[<2 pieces>]]`                    | `[<2 pieces>]`                   |
  | `\Qabc\E{2}`    | `[[<3 pieces>]]`                    | `[<3 pieces>]`                   |
  | `\Qabcdef\E+`   | `[[<6 pieces>]]`                    | `[<6 pieces>]`                   |
  | `\Qab\E{1,3}`   | `[[<2 pieces>]]`                    | `[<2 pieces>]`                   |
  | `\Qa\E{3}`      | `[<1 piece>]` (correct — degenerate) | `[<1 piece>]`                    |
  | `\Q\E{2}`       | `[<1 piece>]` (correct — degenerate) | `[<1 piece>]`                    |
  | `"hello"`       | `[<5 pieces>]` (control — correct)  | `[<5 pieces>]`                   |
  | `"a"`           | `[<1 piece>]` (control — correct)   | `[<1 piece>]`                    |

  Three observations clarify the bug surface:

  1. **The piece data IS correct.** Every typed piece object
     inside the (incorrectly-wrapped) array carries the right
     `atom`, `quantifier`, and `type` fields. The 0074 fix
     correctly attached the quantifier to the last char of the
     run; this report's bug is purely about the structural
     wrapping of the piece array.

  2. **The bug is specific to the array-returning annotation
     path.** Degenerate cases (`\Qa\E{3}`, `\Q\E{2}`) and
     control cases (pure-literal multi-piece concatenations)
     are unaffected because they don't go through
     `piece_quoted_run_quantified`'s array-returning
     `[$2**, ...]` annotation.

  3. **The wrapping is consistent.** Every affected case
     wraps with exactly ONE extra level. This rules out a
     "drops to 1 element" bug (which is what 0075 was) and
     points to a `**` spread evaluator that doesn't handle the
     "one item is an array" sub-case.

  Hypothesis on root cause: the `[$1**]` flatten-spread codegen
  in `rust/src/ast_pipeline/ast_return_transform.rs` (the same
  file PGEN-RGX-0075 was fixed in) iterates `$1`'s items and
  appends each item to the accumulator array. When an item's
  value is itself an array (from
  `piece_quoted_run_quantified -> [$2**, ...]`), the codegen
  appends the whole array as a single element instead of
  spreading its members. The fix likely needs to detect
  Json(Array(_)) values during the spread and recursively
  unwrap one level.

  This matches the documented `**` semantics — "if any piece's
  content is itself a Sequence, unwraps one level so the
  children appear inline" — but the `Json(Array(...))` case
  (post-collapse from a Sequence) appears to not be covered by
  the current codegen.

