id: PGEN-RGX-0070
summary: |
  PGENs `quoted_literal` atom production fails to match `\Q...\E` sequences whose body contains a backslash-escape. `\Qabc\$xyz\E` should parse as a single `quoted_literal` AST node whose body is the literal string "abc\$xyz" (8 characters: a, b, c, \, $, x, y, z), but PGEN falls through to the generic `simple_escape` production and reports "unrecognized simple_escape character Q" — indicating it never matched `quoted_literal` at all for this input.
