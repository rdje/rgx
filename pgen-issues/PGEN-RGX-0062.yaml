id: PGEN-RGX-0062
summary: |
  PGEN regex parser rejects a PCRE2 callout (?C...) placed in the conditional-assertion position `^(?(?C...)...|...)` at parse time. PCRE2 10.47 accepts this — testoutput2:14984 bytecode dump shows Cond Callout 25 ... Assert abc.
