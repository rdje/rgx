          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0062/pgen_trace.log
  pattern: "^(?(?C25)(?=abc)abcd|xyz)"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`). PCRE2 10.47
    accepts callouts at conditional-assertion position. Proof:
    testoutput2:14984 bytecode dump for
    `/^(?(?C25)(?=abc)abcd|xyz)/B,callout_info` explicitly
    shows the layering:
        Bra / ^ / Cond / Callout 25 9 3 / Assert / abc / Ket
                         ^^^^^^^^^^^^^^ PCRE2 accepts this
    Affects ~6 conformance cases across testinput2 + testinput6
    (identical pattern, different modifiers):
        ^(?(?C25)(?=abc)abcd|xyz)
        ^(?(?C$abc$)(?=abc)abcd|xyz)

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept a callout `(?C...)` at the conditional-
  assertion slot of `(?(assertion)true-branch|false-branch)`.
  pcre2pattern(3) §"Conditional subpatterns based on a callout"
  documents this pattern shape — the callout fires before the
  conditional's assertion is evaluated, letting host code
  inspect or veto the conditional decision.

  Suggested grammar amendment in
  `subs/pgen/grammars/regex.ebnf`: the `conditional` production
  admits `assertion | callout | special_condition` in the
  assertion slot rather than only `assertion`.

actual_behavior: |
  PGEN rejects the pattern at position 1 — the `(` opening
  the conditional — with:
        regex compile error: E_PARSE_FAILURE: generated regex parse failed: Parser did not consume full input at position 1
        ^(?(?C25)(?=abc)abcd|xyz)
          ^

  The position-1 diagnostic indicates PGEN can't continue
  parsing past the conditional opener because the next token
  (`?C25`) does not match any recognized conditional-assertion
  alternative.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0062/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0062/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0062/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  ~6 conformance cases in the current harness run. The pattern
  shape — `(?(callout)...|...)` — is a documented PCRE2
  conditional construction. Enabling it also makes sense in
  conjunction with PGEN's existing callout support at normal
  atom positions.

