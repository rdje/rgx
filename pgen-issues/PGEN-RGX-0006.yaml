context:
  feature_flag: default parser (PGEN-backed)
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    PGEN_TRACE_VERBOSITY=debug cargo run --manifest-path subs/pgen/rust/Cargo.toml --features generated_parsers --bin parseability_probe -- --parse regex pgen-issues/artifacts/PGEN-RGX-0006/repro_input.txt --profile regex_default --trace --trace-log-file pgen-issues/artifacts/PGEN-RGX-0006/pgen_trace.log

    cargo run --manifest-path subs/pgen/rust/Cargo.toml --features generated_parsers --bin parseability_probe -- --parse-dump-ast-pretty regex pgen-issues/artifacts/PGEN-RGX-0006/repro_input.txt pgen-issues/artifacts/PGEN-RGX-0006/pgen_ast_dump.json --profile regex_default
  pattern: '\o{101}'
  input: '\o{101}'
  notes: |
    Downstream project: RGX
    PGEN commit: f97e0fe31750885f4fc48a67ed7660110cd20271
    Regex parser release version: 1.1.2
    Regex integration contract version: 1.1.2
    Integration surface: pgen::embedding_api plus parseability_probe
    Host OS / arch: Darwin arm64

    The published regex parser contract lists octal escapes as an accepted form,
    and the unbraced form \040 correctly produces an octal_escape node. The
    braced form \o{NNN} is standard PCRE2 syntax and is currently misparsed.
expected_behavior: |
  The pattern \o{101} should parse as an octal_escape (or a dedicated
  braced_octal_escape) that transports the three octal digits 1, 0, 1 as child
  octal_digit nodes, allowing downstream consumers to decode the codepoint
  (0o101 = 65 = U+0041 = 'A').

  The accepted-tree shape should be analogous to:
    atom -> escape -> escape_unit -> octal_escape [Sequence]
      element_0 (or fused prefix): Terminal("o{")
      element_1 -> octal_digits [Quantified, '+']
        octal_digit -> digit: Terminal("1")
        octal_digit -> digit: Terminal("0")
        octal_digit -> digit: Terminal("1")
      element_2: Terminal("}")

  This would mirror the existing braced hex_escape shape for \x{...}.
actual_behavior: |
  The parser succeeds (parse_full passed) but transports \o{101} as two
  unrelated constructs: the backslash+letter pair \o is parsed as a
  simple_escape via escape_unit -> simple_escape -> any_char -> letter: Terminal("o"),
  and the brace expression {101} is parsed as a free-standing counted_quantifier
  bound to the preceding atom.

  Evidence from the AST dump (pgen_ast_dump.json):
  - 0 occurrences of rule_name "octal_escape"
  - 2 occurrences of rule_name "counted_quantifier"
  - the "o" terminal appears under simple_escape -> any_char -> letter at byte span [1, 2]

  This yields a silently-wrong AST that claims the regex matches the literal 'o'
  repeated 101 times, rather than a single character U+0041.
reproduction: |
  Smallest reproducer:
    pattern: \o{101}
    input file: pgen-issues/artifacts/PGEN-RGX-0006/repro_input.txt (7 bytes)

  Commands: see context.command above.

  Artifacts bundle: pgen-issues/artifacts/PGEN-RGX-0006/
    repro_input.txt   - the 7-byte pattern
    pgen_ast_dump.json - pretty-printed AST dump showing the misparsing
    pgen_trace.log    - debug trace
    pgen_contract.json - pinned contract version snapshot
impact: |
  This is a silent accepted-tree correctness bug (class: "parses but returns
  the wrong AST/dump"). Downstream consumers that trust rule_name dispatch on
  PGEN's output will build an incorrect AST for \o{101} patterns.

  For RGX specifically, this means any user-supplied pattern containing
  \o{NNN} braced-octal escapes will compile to a quantified literal 'o'
  instead of the intended codepoint. This is not caught by RGX's adapter
  because PGEN reports a successful parse.

  Workaround on the RGX side: reject \o{...} at the adapter level or parse
  the span text directly. However, the proper fix is upstream in PGEN since
  the published regex flavor summary in PGEN_USER_GUIDE.md claims octal
  escape support as part of the accepted forms.
resolution:
