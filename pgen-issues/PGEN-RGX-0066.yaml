id: PGEN-RGX-0066
summary: |
  PGEN regex parser rejects `(*scs:(1)a)(a)|x` with "scan_substring capture list references an unavailable capture". The scan_substring verb references group 1 which is defined LATER in the same pattern. PCRE2 10.47 accepts forward references — testoutput2:20177 shows the pattern compiling and running (matches "x" on subject "x"; no match on "a"). PGEN should perform capture-list validation AFTER walking the entire pattern so forward references resolve.
status: closed
opened_at: 2026-04-16T00:00:00Z
first_seen_at: 2026-04-16T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

