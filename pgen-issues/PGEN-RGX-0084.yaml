id: PGEN-RGX-0084
summary: |
  PGEN parses two-digit numeric backslash escapes (`\10`..`\99`) using the
  *total* count of capturing groups in the pattern instead of the count of
  groups defined *up to that parse position*. PCRE2's compile-time
  disambiguation rule reads `\10` as octal `\010` (= U+0008 backspace) when
  fewer than 10 capturing groups have been seen by the time `\10` is parsed,
  even when group 10 is defined later in the same pattern. PGEN emits
  `{"kind":"numeric","type":"backreference","index":10}` for `\10` in such
  forward-reference contexts, which makes downstream consumers treat it as
  a back reference and produce wrong matches.
