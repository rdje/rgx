  | `\Qab*\E{2,}?`      | `ab***z`    | `None`          | `"ab**"`       |
  | `\Qabc\E{2}`        | `abccz`     | `None`          | `"abcc"`       |
  | `\Qab\E{3}`         | `abbbz`     | `None`          | `"abbb"`       |
