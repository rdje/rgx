id: PGEN-RGX-0074
summary: |
  PGEN's `regex` parser binds a quantifier following `\Q...\E` to the
  ENTIRE quoted block, but PCRE2 (and Perl, and the documented
  `\Q...\E` semantics they share) bind the quantifier to the **last
  character** of the literal sequence only.

  As a family the bug fires for every quantifier shape — `?`, `*`,
  `+`, `*?`, `+?`, `{n}`, `{n,}`, `{n,m}`, lazy and possessive
  variants — wherever the quoted block contains MORE THAN ONE
  literal character. Single-character `\Qx\E{n}` cases happen to
  produce the right runtime match by accident, because "quantify
  the whole block" degenerates to "quantify the only char" when
  the block has length 1; this hides the bug from a single-pattern
  reproducer and is why the issue has lurked.

  PCRE2 reference (pcre2pattern(3) §"Backslash"):

  > A quantifier following \Q...\E applies only to the last
  > character of the literal sequence, not to the whole sequence.

  Bug class: **parses but returns the wrong AST/dump** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4). Compile succeeds;
  the AST attaches the quantifier to the wrong subtree, producing
  semantically wrong matches at runtime.

