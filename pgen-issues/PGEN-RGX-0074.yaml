# === Family expected vs actual behavior ===
expected_behavior: |
  PGEN's `regex_default` profile should produce an AST in which a
  quantifier following `\Q…\E` quantifies ONLY the last character of
  the quoted run. Equivalent rewriting (each row is what PCRE2
  parses these patterns as):

  | source                     | semantically-equivalent       |
  |----------------------------|--------------------------------|
  | `\Qab*\E{2,}`             | `a` `b` `\*{2,}`              |
  | `\Qab*\E{2}`              | `a` `b` `\*{2}`               |
  | `\Qab*\E?`                | `a` `b` `\*?`                 |
  | `\Qab*\E+`                | `a` `b` `\*+`                 |
  | `\Qab*\E*`                | `a` `b` `\**`                 |
  | `\Qab*\E*?`               | `a` `b` `\**?`                |
  | `\Qab*\E{1,3}`            | `a` `b` `\*{1,3}`             |
  | `\Qab*\E{2,}?`            | `a` `b` `\*{2,}?`             |
  | `\Qabc\E{2}`              | `a` `b` `c{2}`                |
  | `\Qab\E{3}`               | `a` `b{3}`                    |
  | `\Qa\E{3}`                | `a{3}`           (degenerate)  |
  | `\Q\E{2}`                 | empty                          |

  Equivalently in tree form — the quantifier should attach to a
  **single-character node** that is the last char of the quoted
  run, not to the run as a whole.

actual_behavior: |
  PGEN parses `\Qabc\E{2}` (and the rest of the family) as if the
  quantifier wraps the entire `\Q…\E` literal sequence as a single
  unit. The AST dump (attached as artifact) shows the quantifier
  attached at the run-level, not the last-char level. Downstream
  RGX VM execution then either:

  - matches the literal text once and treats the quantifier as
    applying to the whole literal (so `\Qab*\E{2}` would need
    `ab*ab*` which never occurs in `"ab**z"`, hence "no match"),
  - or matches the literal once and ignores the quantifier on the
    repeat (so `\Qab*\E+` returns `"ab*"` instead of `"ab***"`),
  - or for lazy/zero-width quantifiers, returns an empty match
    (`\Qab*\E?` → `""`, `\Qab*\E*?` → `""`).

  Single-char `\Qa\E{n}` cases produce the right runtime behaviour
  by **accident**: "quantify the whole 1-char block" degenerates to
  "quantify the only char". This is the smoking gun that the bug is
  in the AST shape, not the runtime.

