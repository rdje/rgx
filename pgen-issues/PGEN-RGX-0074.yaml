# === Suggested fix direction (for PGEN-side analysis) ===
fix_direction: |
  Two equivalent ways to land the fix in the parser:

  **Option A — Decompose `\Q…\E` at lex time.**
  Have the lexer emit one literal-char token per character inside
  `\Q…\E`, with an empty `\Q\E` emitting zero tokens. The
  quantifier-attachment grammar rule then attaches to the trailing
  literal as it would for any explicit literal sequence. This is
  the RE2 / Rust-`regex_syntax` shape and matches PCRE2's behaviour
  by construction.

  **Option B — Keep the `\Q…\E` AST node but split it on quantifier
  attachment.** When a `Quantified` rule reduces with a `LiteralRun`
  child, peel the last character off the run, leaving the prefix as
  a sequence and binding the quantifier to the peeled-off
  trailing-char node. Empty literal runs produce an empty quantified
  group (matches PCRE2: `\Q\E{2}` matches empty zero-width, the
  current degenerate case).

  Option A is simpler from the grammar side and makes the bug
  unrepresentable downstream. Option B keeps `\Q…\E` as a first-class
  node for any future tooling that wants to recognise quoted runs
  (e.g. literal-prefix optimisations) but adds a minor special case
  to the `Quantified` reduction.

  The cross-engine reference here is RE2 / Rust `regex_syntax`,
  which both treat `\Q…\E` as a desugaring of individual literal
  chars; their parsed AST for `\Qab*\E{2}` contains three Char
  nodes plus a `Quantified(Char(*), {2})` node, exactly matching
  PCRE2's runtime behaviour.

  Either fix should also make these implicit cases consistent:
  - `\Qab*\E*` / `\Qab*\E+` / `\Qab*\E?`  (greedy)
  - `\Qab*\E*?` / `\Qab*\E+?` / `\Qab*\E??` (lazy)
  - `\Qab*\E*+` / `\Qab*\E++` / `\Qab*\E?+` (possessive, where supported)
  - `\Qab*\E{n}` / `\Qab*\E{n,}` / `\Qab*\E{n,m}` (and lazy/possessive)

  All twelve+ shapes reduce to the same root: "the last literal
  inside `\Q…\E` is the operand of any trailing quantifier".

impact: |
  Material to PCRE2 conformance: the family above currently
  contributes false-negative ratchet cases. The first concrete one
  surfaced by the corpus is testinput1:6794 `/\Qab*\E{2,}/` on
  `"ab***"` (expected match, RGX returns no match). Beyond
  conformance, the bug silently produces wrong matches for any
  user who uses `\Q…\E` to quote a multi-char literal that they
  intended to repeat — a common idiom for "match this verbatim N
  times" that this construct is supposed to express compactly.

  No correctness escape hatch exists in RGX-side: the AST is
  consumed verbatim from PGEN. Per `CLAUDE.md`, parser bugs are
  fixed in PGEN, not patched around in RGX.

