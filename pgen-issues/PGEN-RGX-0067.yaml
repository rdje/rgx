  pattern: "a[\\NB]c"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput2` block #0 starting
    near input line 3553. PCRE2 10.47 *rejects* this pattern at compile time; PGEN accepts it. See `expected_behavior` / `actual_behavior` for the exact rule.

# === Bug class (per protocol §4) ===
bug_class: should_fail_but_parses

expected_behavior: |
  PGEN should reject the pattern at parse time with a diagnostic equivalent to "\N is not allowed in a character class", matching PCRE2 10.47. The rule from pcre2pattern(3) §"Generic character types" is that `\N` outside a class means "any codepoint that is not a newline", and that interpretation is explicitly forbidden inside `[...]`. PGEN currently accepts and emits a class_escape node wrapping `\N` which RGX then lowers to `Regex::Dot` → Char(.) — so the downstream engine not only matches a pattern PCRE2 refused to compile but also matches it with the *wrong* semantic.

actual_behavior: |
  PGEN successfully parses `a[\NB]c` and emits `class_item -> class_escape(\N)`. RGX's adapter lowers that class_escape to `Regex::Dot`, which `extend_ranges_from_regex` then turns into a single-codepoint range for `.`, ultimately producing `Regex::CharClass(Custom { ranges: [CharRange { start: '.', end: '.' }, CharRange { start: 'B', end: 'B' }], negated: false })`. RGX compiles the pattern without error and matches "a.c" and "aBc" — PCRE2 would have refused to compile the pattern entirely. Affects ~135 cases in the "RGX too permissive" bucket of the PCRE2 conformance harness.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0067/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0067/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0067/pgen_trace.log

  Expected: parseability_probe rejects the input with a `\N is not allowed in a character class`-style diagnostic (or the analogous PCRE2 reason for this cluster).
  Actual: PGEN accepts the pattern; `pgen_parse_outcome.json` records `status: success` with no diagnostic. RGX then compiles the (PCRE2-incompatible) AST and matches against subjects PCRE2 would refuse.

impact: |
  One of many PGEN-related failures uncovered by RGX's
  PCRE2 10.47 testinput1 conformance harness. Each failing pattern
  also blocks RGX from passing the corresponding pcre2test case.
  Aggregate impact is tracked in `docs/BACKLOG.md` C7.

