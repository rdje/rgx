id: PGEN-RGX-0067
summary: |
  PGEN accepts `\N` inside `[...]` — PCRE2 10.47 rejects with "\N is not supported in a character class". pcre2pattern(3) §"Generic character types" states: "\N has an identical meaning to . except that it cannot be used in a character class." PGENs grammar should enforce the same restriction so `[...\N...]` becomes a parse error.
