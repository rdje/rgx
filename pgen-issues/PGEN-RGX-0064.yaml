  pattern: "(?<=X(?(DEFINE)(.*))Y)."
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` line 6525. PCRE2 10.47
    accepts the pattern and matches `"Z"` against subject
    `"AXYZ"` (verified testoutput1:10300). The lookbehind body
    `X(?(DEFINE)(.*))Y` is effectively fixed-length `"XY"` at
    match time — `(?(DEFINE)(.*))` is a named-subpattern
    definition block that consumes nothing.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN's lookbehind-length analysis (in
  `rust/src/regex_compile_validation.rs` or equivalent) should
  treat `(?(DEFINE)...)` blocks as contributing zero width to
  the enclosing lookbehind. pcre2pattern(3) §"Defining
  subpatterns for use by reference only" documents DEFINE
  blocks as purely declarative — they never match anything at
  the position where they appear. The existing lookbehind
  body-length computation should special-case
  `conditional` AST nodes whose `condition` is `DEFINE` and
  assign them length 0.

actual_behavior: |
  PGEN's compile-contract validator rejects the pattern,
  reporting the inner `(.*)` as evidence of an "unbounded
  variable-length lookbehind":
        regex compile error: E_PARSE_FAILURE: unbounded variable-length lookbehind is not accepted by the regex compile contract
        (?<=X(?(DEFINE)(.*))Y).
        ^

  The analyzer walks the lookbehind body and sees `.*` as a
  zero-or-more quantifier contributing unbounded length. It
  misses that `.*` is inside a `(?(DEFINE)…)` block and
  therefore effectively wrapped in zero-width semantics.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0064/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0064/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0064/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  1 direct testinput1 case
  (`(?<=X(?(DEFINE)(.*))Y).`). Related patterns that use
  DEFINE blocks in non-consuming positions may also be
  affected once tested. Small cluster, but the underlying
  analysis gap is worth a dedicated fix because DEFINE-in-
  lookbehind is a documented PCRE2 idiom for precomputed
  patterns referenced via `\g<name>` / `(?1)` elsewhere.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.25"
  fixed_in_parser_backend_version: "ffd61e9"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.25 adjusts the compile-contract validator to skip
    `(?(DEFINE)...)` conditional blocks during the lookbehind
    width scan — matching the PCRE2 rule that DEFINE subpatterns
    are purely declarative and consume nothing at match time.
    Release commit ffd61e9 cites this report in its commit
    message ("skip DEFINE conditionals during lookbehind width
    scan").

    Verified:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '(?<=X(?(DEFINE)(.*))Y).' /tmp/v.json
    → status=success.

    No RGX adapter change required — the lookbehind-body AST
    already shapes correctly; only PGEN's pre-validation was
    gating it.
