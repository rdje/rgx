id: PGEN-RGX-0064
summary: |
  PGEN regex parser rejects `(?<=X(?(DEFINE)(.*))Y).` with "unbounded variable-length lookbehind". The `(?(DEFINE)(.*))` construct is a named-subpattern definition block that consumes nothing at match time; the lookbehind body is effectively the fixed-length "XY". PCRE2 10.47 accepts this (testoutput1:10300 matches "Z"). The fix is to treat `(?(DEFINE)...)` as zero-width in the lookbehind length analysis.
status: closed
opened_at: 2026-04-16T00:00:00Z
first_seen_at: 2026-04-16T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

