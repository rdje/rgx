  pattern: '\g<n> vs \g{n}'
  notes: |
    Detected during the RGX walker migration for PGEN 1.1.40 → 1.1.74.
    Slices 11 (release 1.1.41), 12 (1.1.42), and 13 (1.1.43) progressively
    typed the named-ref family, subroutine_ref cleanup, and signed_digits.
    The end state collapses every `\g`-prefixed reference to
    `kind:"subroutine"` regardless of which bracket form the source used,
    breaking PCRE2's bracket-form-determines-semantic rule.

    Observed AST shapes (post-1.1.74):
      `\g<n>`  → {type:"backreference", kind:"subroutine", ref:"n"}
      `\g{n}`  → {type:"backreference", kind:"subroutine", ref:"n"}
      `\g<1>`  → {type:"backreference", kind:"subroutine", ref:{sign:[],value:1}}
      `\g{1}`  → {type:"backreference", kind:"subroutine", ref:{sign:[],value:1}}
      `\g1`    → {type:"backreference", kind:"subroutine", ref:{sign:[],value:1}}

    PCRE2 semantics from pcre2pattern(3) §"Subroutine references and
    recursive patterns":
      `\g<NAME>` / `\g'NAME'` — subroutine call (re-execute the group)
      `\g<N>`   / `\g'N'`    — subroutine call (re-execute group N)
      `\g{NAME}`              — back-reference
      `\g{N}`                 — back-reference
      `\gN`                   — back-reference

    With the bracket form discarded, RGX can't faithfully lower the
    typed AST. Currently RGX disambiguates by `ref` shape — string =
    named subroutine, object = backreference — which gets the common
    cases right but produces wrong AST for `\g<N>` (PCRE2 expects
    subroutine call; RGX's heuristic produces a back-reference).
    `tests::g_bracketed_is_subroutine_call_not_backref` regression-pin
    fails post-bump.
expected_behavior: |
  The typed AST should preserve the bracket-form distinction so
  downstream consumers can lower correctly. Two equally workable
  shapes:

  Option A — separate `kind` per bracket form:
    {kind:"subroutine_named",      ref:"n"}    // \g<n>
    {kind:"subroutine_numeric",    ref:{sign,value}}  // \g<1>
    {kind:"named_braced",          ref:"n"}    // \g{n}
    {kind:"numeric_backreference", ref:{sign,value}}  // \g{1}, \gN

  Option B — keep `kind:"subroutine"` for the angle/apostrophe forms
  only, and route brace/bare forms to the existing `kind:"named"` /
  `kind:"numeric"` (already typed correctly for `\k`-prefixed and
  `\NN` family).

  Either preserves the 1:1 mapping from source bracket to AST kind.
actual_behavior: |
  All five `\g`-prefixed forms produce `kind:"subroutine"` with no
  bracket-form indicator. Downstream consumers can disambiguate
  string-vs-numeric via `ref` shape but cannot recover angle-vs-brace.
reproduction: |
  Reproducer matrix:
    `\g<n>` (named subroutine call — should match group n)
    `\g{n}` (named back-reference — fails if group n hasn't captured)
    `\g<1>` (numeric subroutine call — re-executes group 1)
    `\g{1}` (numeric back-reference — fails if group 1 unset)
    `\gN`   (numeric back-reference)

  Probe via `pgen::embedding_api::parse_grammar_profile_ast_dump_named`
  on each, with the `regex_default` profile. Compare AST kind/ref
  fields against the expected shapes in "Expected behavior".

  RGX failing test (pinned before bump, re-fails post-bump):
    `tests::g_bracketed_is_subroutine_call_not_backref` —
    `^(?<name>a|b\g<name>c)` should match `bac`. With the typed
    shape collapse, `\g<name>` lowers to a back-reference instead
    of a recursive subroutine call.
impact: |
  Class: "parses but returns the wrong AST/dump".

  RGX-specific impact:
    - Cannot faithfully implement PCRE2's `\g<...>` subroutine-call
      vs `\g{...}` back-reference distinction.
    - 8+ conformance tests across testinput2 (Saturday/recursion
      patterns) and 1+ lib regression test fail post-bump until
      bracket distinction is restored.

  Workaround: RGX can heuristically dispatch by `ref` shape (string →
  recursion, object → backreference) which fixes most cases but
  mis-handles `\g<N>` (numeric subroutine call) — that pattern flows
  to backreference instead of recursion. No reliable workaround
  without bracket-form context.
