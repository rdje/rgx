id: PGEN-RGX-0081
summary: |
  Typed `\g`-prefixed backref/subroutine shape lost the bracket-form distinction. PGEN now emits the same `{type:"backreference", kind:"subroutine", ref:<...>}` typed object for `\g<n>` (subroutine call), `\g{n}` (back-reference), and `\gN` (back-reference) — so downstream consumers cannot recover PCRE2's "angle/apostrophe = subroutine, brace/bare = backreference" rule from the AST. RGX previously distinguished them via the legacy un-typed `subroutine_ref` array's first element (`<` vs `{`); after slices 11+12+13 typed the family, that signal is gone.
