id: PGEN-RGX-0075
summary: |
  PGEN's `regex` parser at HEAD `58b2594e` produces a typed AST in
  which a multi-piece concatenation collapses to **only its first
  piece**. For input `"ab"` the typed `regex.pattern` field reports
  one piece for `"a"` and the `"b"` is silently dropped. The parse
  itself succeeds and the outer `span` correctly covers the full
  input — the bug is purely in the typed-shape rendering of
  `concatenation = piece+ -> [$1**]`.

  The bug is shape-level, not character-level: every multi-char
  literal concatenation (`"ab"`, `"abc"`, `"foo\Kbar"`, `"hello"`,
  ...) hits it, and the dropped suffix is whatever follows the
  first piece. Single-piece patterns (`"a"`, `"."`, `"[a-z]"`,
  `"(abc)"` where `abc` is wrapped in a group, `"a*"`) are
  unaffected because they emit a single-element flat array.

  Root cause appears to be in PGEN's `[$1**]` flatten-spread
  emission for `concatenation`. The annotated rule:

      concatenation = piece+ -> [$1**]

  is documented in `subs/pgen/docs/regex_parser_book/src/rules-top-level.md`
  to emit `Json(Array([<piece_0>, <piece_1>, ...]))` — a flat
  array of every piece in the `piece+` Quantified-+ result.
  Empirically the array only contains `<piece_0>`; pieces 1..N are
  discarded.

  Bug class: **parses but returns the wrong AST/dump** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4). The parser does
  not error or panic; it simply emits a typed AST that drops
  structure the parser obviously matched (the input span is the
  full input range, so `piece+` clearly succeeded for all pieces).

  Impact on RGX: catastrophic — every regex with a multi-piece
  concatenation produces a wrong AST, so the compiled regex
  matches only the first character/atom of any literal sequence.
  `Regex::compile("abc")` matches `"abc"` only at position 0..1
  (just `"a"`), not 0..3. RGX's lib test suite drops from passing
  baseline to ~73% pass rate purely from this single PGEN issue
  (817/1119 lib tests pass with the typed-shape walker; the 302
  failures are dominated by the dropped-pieces bug).

