# === Verification checklist for the fix ===
verification:
  - For each of the three reproducer inputs, re-running the dump
    helper should produce a typed `pattern[0][0]` array with the
    expected number of pieces (2 for `"ab"`, 3 for `"abc"`, 7 for
    `"foo\Kbar"` once `\K` is consumed as a single anchor atom).
  - RGX's lib test suite should jump from the current ~817/1119
    pass count back to its pre-refactor baseline (~1118/1119,
    modulo the small handful of legitimate semantic tests we
    haven't audited).
  - `cargo run --bin rgx -- 'abc' 'abc'` should report `0..3`
    instead of `0..1`.
  - `make regex_typed_differential_gate` (per the integration
    contract) should pass byte-equivalence between
    `parse_full_regex().content.to_json_value()` and
    `parse_regex_typed()`.

impact: |
  ## Direct impact on RGX

  This is a **show-stopper** for RGX integration with PGEN at
  HEAD. With the current bug, RGX's regex compiler produces
  silently-truncated AST for every multi-piece literal sequence.
  Match results are broken across the entire test corpus:

  - **Lib test suite**: 817/1119 lib tests pass with my
    in-progress typed-shape walker; ~302 failures are dominated
    by dropped-pieces patterns.
  - **PCRE2 conformance ratchet**: cannot run while pieces are
    lost — every `"abc"`-style fixture would FN.
  - **CLI demo**: `rgx 'abc' 'abc'` returns `0..1`, indistinguishable
    from a literal-finder bug.

  This is purely shape-level — no information is lost from the
  parse itself (the span proves the bytes were consumed), so a
  fix should be straightforward once the offending codegen line
  in PGEN's `[$1**]` evaluator is found.

  ## Why it lands as a PGEN issue, not an RGX one

  RGX's `CLAUDE.md` codifies a hard rule: "PGEN is the sole
  parser. No builtin parser fallback." And our memory entry
  `feedback_no_pgen_workarounds.md` explicitly says: "If PGEN's
  parser is wrong (wrong AST / rejects valid / accepts invalid),
  file a PGEN report per the cluster-first protocol; never add
  RGX adapter code to absorb malformed output."

  An RGX-side workaround that walked the un-annotated raw
  envelope around `concatenation` to recover the missing pieces
  would (a) violate that rule, (b) create a second source of
  truth for piece extraction that disagrees with PGEN's typed
  shape, and (c) add maintenance burden once PGEN ships the fix
  and the typed shape becomes correct again. So we report
  upstream and wait.

  ## Severity assessment

  **Critical** — affects every multi-piece concatenation on the
  default profile. Bypasses no class of input. The only patterns
  that work correctly today are those whose top-level
  concatenation is a single atom (literal, group, char class,
  escape, etc., with optional quantifier).

  ## Estimated cluster size in the conformance corpus

  Hard to estimate without re-running the conformance harness
  (which can't run with broken concat). But the ratchet baseline
  before the typed-concatenation slice landed was 12,709 / 101
  on a 12,810-case corpus. Most of that corpus has multi-piece
  concatenations. We expect a fix to restore the ratchet to the
  same baseline ±10 cases.

resolution:
  status: fixed-upstream
  fixed_in_pgen_release: "1.1.34"
  fixed_in_pgen_commit: "71edfae5"
  fixed_in_rgx_commit: null
  verified_at: 2026-05-01T00:00:00Z
  verification_notes: |
    PGEN 1.1.34 (`71edfae5`) "PGEN-RGX-0075: typed-shape correctness
    for multi-piece concatenation" fixed the `$N` codegen in
    `rust/src/ast_pipeline/ast_return_transform.rs` — removed the
    `Quantified` peel-arm that was dropping pieces 1..N when
    `captured_vars.len() == 1`. Compensating grammar change made
    `regex = pattern -> ...` total (alternative = concatenation? handles
    emptiness internally). PGEN added a regression-lock test
    `regex_parser_pgen_rgx_0075_multi_piece_concatenation_surfaces_all_pieces`
    in `rust/src/embedding_api.rs` pinning shapes for "a", "ab", "abc",
    "hello". Verified end-to-end via `pgen_concat_dump.rs` — `"ab"` →
    2 pieces, `"abc"` → 3 pieces, `"foo\\Kbar"` → 7 pieces, all flat
    at `pattern[0][0]` per the documented shape.
