# === Family expected vs actual behavior ===
expected_behavior: |
  Per `subs/pgen/docs/regex_parser_book/src/rules-top-level.md`:

      ## `concatenation`

      ```ebnf
      concatenation = piece+
      -> [$1**]
      ```

      **Annotated** with `[$1**]`, the flatten-spread of `piece+`.
      Emits a flat array of piece objects.

  And the worked example for `abc`:

      "pattern": [
        [[
          { "atom": "a", "quantifier": [], "type": "piece" },
          { "atom": "b", "quantifier": [], "type": "piece" },
          { "atom": "c", "quantifier": [], "type": "piece" }
        ]],
        []
      ]

  The flat array of 3 piece objects is the `concatenation`
  output, lifted into `pattern[0][0]` through the alternation /
  alternative wrappers.

  In other words: for any input matching `piece+`, every piece
  the parser successfully consumed should appear in the typed
  array at `pattern[0][0]`.

actual_behavior: |
  PGEN's typed AST contains only the **first** piece. Every
  subsequent piece is dropped from the typed array, even though:

  1. The parse SUCCEEDS — `parse_grammar_profile_named` returns
     status=`success` with no diagnostic.
  2. The outer `span` covers the FULL input — `span: {start: 0, end: N}`
     where `N` is the full byte length. The parser provably matched
     all `N` bytes.
  3. RGX's `parseability_probe --parse-dump-ast-pretty` AND
     `pgen::embedding_api::parse_grammar_profile_ast_dump_named`
     produce byte-identical typed JSON shapes with the truncation,
     ruling out a probe-vs-API divergence.

  Concrete observed shapes (see `pgen_ast_dumps/` artifacts):

      input "ab"        → pattern[0][0] = [{atom:"a",...}]              (span 0..2)
      input "abc"       → pattern[0][0] = [{atom:"a",...}]              (span 0..3)
      input "foo\Kbar"  → pattern[0][0] = [{atom:"f",...}]              (span 0..8)

  In each case the typed array has exactly ONE piece — the first
  one. The remaining pieces (b; b, c; o, o, \K, b, a, r
  respectively) are silently lost.

  Hypothesis on root cause: the `[$1**]` flatten-spread codegen
  on the regex profile is iterating only the first item of `$1`
  (the `piece+` Quantified-+ result), rather than spreading every
  item. Could be a `take(1)` / `next()` instead of `for ... in`,
  or a misplaced early-return inside the spread evaluator.

