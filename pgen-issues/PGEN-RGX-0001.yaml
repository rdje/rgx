expected_behavior: |
  If whole-pattern recursion (?R) is intentionally supported, the parser should classify it in the same recursion/subroutine family as (?1) and (?&name), not as inline modifiers.

  If whole-pattern recursion is intentionally out of scope for the published regex contract, the generated backend should reject (?R) deterministically instead of accepting it as a different construct.
actual_behavior: |
  The generated regex backend accepts (?R) successfully, but the AST dump routes it through:
  - inline_modifiers
  - modifier_spec
  - modifier_group
  - modifier_char = "R"

  No recursion or subroutine node appears in the accepted tree.
reproduction: |
  Exact tracked reproducer bundle:
  - pgen-issues/artifacts/PGEN-RGX-0001/repro_input.txt
  - pgen-issues/artifacts/PGEN-RGX-0001/pgen_contract.json
  - pgen-issues/artifacts/PGEN-RGX-0001/pgen_parse_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0001/pgen_ast_dump_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0001/pgen_ast_dump.json
  - pgen-issues/artifacts/PGEN-RGX-0001/pgen_trace.log

  Key facts from the bundle:
  - pgen_contract.json reports supports_regex_generated_backend=true, regex_parser_release_version=1.1.0, and regex_integration_contract_version=1.1.0.
  - pgen_parse_outcome.json reports status=success with no diagnostic.
  - pgen_ast_dump.json classifies the accepted construct as inline_modifiers spanning bytes 0..4.
  - Within that tree, the "R" token is emitted as modifier_char inside modifier_group.

  Useful control checks run against the same generated backend:
  - (?1) parses as subroutine_call with subroutine_target=digits.
  - (?&name) parses as subroutine_call with subroutine_target carrying the named target.

  That control evidence suggests the misclassification is specific to (?R), not the full recursion/subroutine family.
impact: |
  RGX cannot safely map (?R) into its own recursion AST or compile-boundary error path if the published PGEN transport classifies it as inline modifiers.

  More importantly for PGEN, the current behavior is ambiguous for downstreams: the backend accepts the syntax, but the accepted tree says it is a different construct.
resolution:
