id: PGEN-RGX-0055
summary: |
  PGEN's pgen-generated-regex worker thread overflows its 8 MiB stack
  and aborts the process (SIGABRT) when parsing a pattern whose named
  groups mutually recurse through `\g<name>` references (a
  Python-variable-interpolation grammar from PCRE2 testinput2 line 2880).
status: open
opened_at: 2026-04-13T00:00:00Z
first_seen_at: 2026-04-13T00:00:00Z
last_updated_at: 2026-04-13T00:00:00Z

# === Parser identity (per PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md §1) ===
parser_backend: pgen
parser_backend_version: "8783757"
parser_release_version: "1.1.10"
integration_contract_version: "1.1.10"
parser_family: regex
profile: regex_default
integration_surface: parseability_probe
generated_artifact: "PGEN submodule subs/pgen, embedded via rgx-core/src/parsing.rs"

# === Host project identity (per protocol §2) ===
host_project: rgx
rgx_commit: ca4fcbc
host_os: macos
host_arch: aarch64
rust_toolchain: "rustc per workspace rust-version = 1.88"
cargo_features: "default + pgen-parser"

upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0055/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0055/pgen_trace.log
  pattern: "(?=(?<regex>(?#simplesyntax)\\$(?<name>[a-zA-Z_\\x{7f}-\\x{ff}][a-zA-Z0-9_\\x{7f}-\\x{ff}]*)(?:\\[(?<index>[a-zA-Z0-9_\\x{7f}-\\x{ff}]+|\\$\\g<name>)\\]|->\\g<name>(\\(.*?\\))?)?|(?#simple syntax withbraces)\\$\\{(?:\\g<name>(?<indices>\\[(?:\\g<index>|'(?:\\\\.|[^'\\\\])*'|\"(?:\\g<regex>|\\\\.|[^\"\\\\])*\")\\])?|\\g<complex>|\\$\\{\\g<complex>\\})\\}|(?#complexsyntax)\\{(?<complex>\\$(?<segment>\\g<name>(\\g<indices>*|\\(.*?\\))?)(?:->\\g<segment>)*|\\$\\g<complex>|\\$\\{\\g<complex>\\})\\}))\\{"
  source: |
    Discovered by the RGX PCRE2 conformance harness while scanning
    `subs/pcre2/testdata/testinput2` line 2880. PCRE2 10.47 parses
    and matches this pattern — it's a Python-style variable
    interpolation grammar with six mutually-recursive named groups
    (`regex`, `name`, `index`, `indices`, `complex`, `segment`) that
    reference each other via `\g<name>`. PGEN's regex parser aborts
    the process (SIGABRT, unrecoverable by `catch_unwind`) when
    walking the recursion.

    Both the RGX conformance harness and the `file_pgen_issues`
    generator now skip this pattern via a prefix-signature guard
    (`pat.starts_with("(?=(?<regex>(?#simplesyntax)")`) so the
    other 11,215 cases across 23 testinput files can run to
    completion.

# === Bug class (per protocol §4) ===
bug_class: panics_or_crashes

expected_behavior: |
  PGEN should accept this pattern and produce a structured AST.
  PCRE2 parses it cleanly (it's a valid regex with mutually-
  recursive named-group definitions — `\g<name>` is a subroutine
  reference, not backreference). Either:
  (a) raise `GENERATED_REGEX_WORKER_STACK_BYTES` high enough to
      absorb this kind of recursion, or
  (b) rewrite the relevant productions iteratively with an
      explicit parse stack, or
  (c) detect depth overflow and return a structured
      `E_PARSE_FAILURE` with a named-group-recursion-depth
      diagnostic.

actual_behavior: |
  Calling `pgen::embedding_api::parse_grammar_profile_named("regex",
  "regex_default", pattern)` with this input spawns the
  pgen-generated-regex worker thread (8 MiB stack) which then
  exhausts its stack walking the cross-references among the six
  named groups. The Rust runtime prints:
      thread 'pgen-generated-regex' has overflowed its stack
      fatal runtime error: stack overflow, aborting
  followed by SIGABRT (signal 6). No structured `ParseOutcome` is
  captured; the process exits.

  Reproducible via the embedding API and via `parseability_probe`.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0055/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — placeholder noting the abort

  Reproduction command (from rgx repo root):
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0055/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0055/pgen_trace.log

  Expected: structured parse outcome.
  Actual: process abort via stack overflow.

impact: |
  Related to PGEN-RGX-0054 (80-level nesting) as a parser-depth
  issue, but this pattern is a more realistic shape: a grammar-
  driven regex that could plausibly come from a real codebase's
  template language. A downstream consumer accepting untrusted
  regex patterns can be DOS'd by any pattern with this kind of
  mutual-group recursion. The RGX PCRE2 conformance harness loses
  exactly 1 of 11,216 cases to the skip guard — 0.009% — but the
  underlying parser fragility remains.

