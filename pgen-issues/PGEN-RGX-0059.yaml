id: PGEN-RGX-0059
summary: |
  PGEN regex parser rejects named-group identifiers containing non-ASCII letters at position 0 with "Parser did not consume full input". PCRE2 10.47 accepts non-ASCII Unicode letters in named-group identifiers when UTF mode is enabled (testinput4 is UTF+Unicode-properties).
status: closed
opened_at: 2026-04-15T00:00:00Z
first_seen_at: 2026-04-15T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

