  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0059/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0059/pgen_trace.log
  pattern: "(?'ABáC'...)\\g{ABáC}"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput4` line 2543 and adjacent
    lines (testinput4 header sets `#pattern utf` for the whole
    file). pcre2pattern(3) §"Named subpatterns" states: "In
    PCRE2, the name may contain any Unicode letter or digit."
    The corresponding section of testinput4 (comment on line
    2542: "Test group names containing non-ASCII letters and
    digits") explicitly exercises this feature.
    Affects ~8 test cases.

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept non-ASCII Unicode letters and digits in
  named-group identifiers (`(?<name>…)`, `(?'name'…)`,
  `(?P<name>…)`) and in the matching backreference / subroutine-
  call forms (`\g{name}`, `\g<name>`, `\k<name>`, `\k'name'`,
  `(?&name)`, `(?P=name)`), at least when the pattern is being
  parsed under the default profile where UTF-aware identifier
  handling is expected.

  Suggested relaxation in `subs/pgen/grammars/regex.ebnf`:
  extend the `name_char` (or equivalent identifier) production
  from `[A-Za-z0-9_]` to include `unicode_letter` and
  `unicode_digit` productions — `unicode_char` is already
  defined in the grammar as the non-ASCII catch-all.

actual_behavior: |
  PGEN stops at the first non-ASCII byte of the identifier with:
        regex compile error: E_PARSE_FAILURE: generated regex parse failed: Parser did not consume full input at position 0

  The position-0 diagnostic refers to the pattern position of
  the first non-ASCII codepoint (á, ʰ, א, ᾈ, 𐨐, etc.); PCRE2
  by contrast consumes the entire identifier and produces a
  named group with the Unicode name.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0059/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0059/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0059/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  ~8 test cases across testinput4 depend on non-ASCII named-
  group identifiers. Representative patterns:
    (?'ABáC'...)\g{ABáC}
    (?'XʰABC'...)
    (?'XאABC'...)
    (?'XᾈABC'...)
    (?'𐨐ABC'...)
    ^(?'אABC'...)(?&אABC)(?P=אABC)
    ^(?'אABC'...)(?&אABC)
  Each currently fails RGX `Regex::compile` at PGEN parse. With
  the grammar relaxation, all should compile and match.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.23"
  fixed_in_parser_backend_version: "cd0f8c7"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.23 widened capture names so PCRE2 UTF-mode Unicode
    letters can appear in group names and named references
    (release notes cite this report). The validator also enforces
    non-digit first character and `MAX_NAME_SIZE=128`.

    Verified against the updated submodule:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only "(?'ABáC'...)\\g{ABáC}" /tmp/verify.json
    emits `"status": "success"` — PGEN parses the repro cleanly.

    No RGX adapter wiring required; the adapter already walks the
    name-node's terminals via `collect_all_terminal_chars`, which
    accepts arbitrary Unicode codepoints.
