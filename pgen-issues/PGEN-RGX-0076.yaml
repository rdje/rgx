# === Family expected vs actual behavior ===
expected_behavior: |
  Per `subs/pgen/docs/regex_parser_book/src/rules-char-class.md`
  forward-looking shape:

      { "type": "posix_class", "name": <str>, "negated": <bool> }

  The book also surfaces the inline-doc admission that the
  current `-> $1` annotation is a placeholder. A correct
  annotation would emit the structured shape above, where:
    - `name` is the matched POSIX class name (string from the
      `posix_name` rule body).
    - `negated` is `true` when the optional `posix_negation?`
      slot matched a `^`, otherwise `false`.

  Equivalent surface forms:
    - `[[:alpha:]]`     → class_item is `{type:"posix_class", name:"alpha",  negated:false}`
    - `[[:^alpha:]]`    → class_item is `{type:"posix_class", name:"alpha",  negated:true}`
    - `[[:digit:]]`     → class_item is `{type:"posix_class", name:"digit",  negated:false}`
    - `[[:xdigit:]]`    → class_item is `{type:"posix_class", name:"xdigit", negated:false}`

  Such a shape preserves all parsed information — no consumer-
  side source-text fallback required.

actual_behavior: |
  PGEN's typed AST collapses every `posix_class` atom to the
  bare literal string `"[:"`. The matched `posix_name` and the
  optional `posix_negation` are silently lost from the typed
  shape; the closing `":]"` terminal is also dropped. The parse
  itself succeeds (the outer span correctly covers the full
  POSIX class), and downstream the un-annotated `class_item ->
  Alternative(posix_class)` wrapper unwraps transparently, so
  the typed value at the class_body level is just `"[:"`.

  Concrete observed shapes (see `pgen_ast_dumps/` artifacts):

      [[:alpha:]]   → class_body[0] = "[:"
      [[:^alpha:]]  → class_body[0] = "[:"
      [[:digit:]]   → class_body[0] = "[:"
      [[:xdigit:]]  → class_body[0] = "[:"
      [[:alpha:][:digit:]]
                    → class_body = ["[:", "[:"]   (both classes truncated identically)

  The first two cases prove the negation is lost; cases 1–4
  prove the name is lost; case 5 proves an N-class body cannot
  even disambiguate position-1's name from position-2's.

  Hypothesis on root cause: the `-> $1` annotation in
  `posix_class = "[:" posix_negation? posix_name ":]" -> $1`
  is mechanically correct — `$1` is the first body element,
  which IS the literal `"[:"` Terminal. The bug is the choice
  of annotation, not its evaluation. A correct annotation needs
  to construct an object literal that captures `$2` (negation
  marker, possibly null) and `$3` (the parsed POSIX name).

