# === Verification checklist for the fix ===
verification:
  - For `[[:alpha:]]`, the typed `class_body[0]` should expose
    both `name="alpha"` and `negated=false` in the typed JSON
    (e.g. as `{type:"posix_class", name:"alpha", negated:false}`).
  - For `[[:^digit:]]`, the typed shape should expose
    `name="digit"` AND `negated=true` — both bits preserved.
  - For `[[:alpha:][:digit:]]`, the body should be a 2-element
    typed array distinguishing the two classes.
  - RGX's lib test suite should pass `tests::ucp_pragma_unicodefies_posix_classes`
    and `tests::ucp_graph_includes_format_and_private_use` once
    RGX bumps PGEN to a release containing this fix and re-runs
    its conformance harness.
  - The PCRE2 conformance ratchet should not regress (POSIX
    classes are heavily used across `testinput1..29`).
  - `rgx-core/examples/pgen_posix_class_dump.rs` re-run should
    produce 21 dump files where every `class_body` element is
    a typed object containing the POSIX class name.

# === Family observations beyond the primary cluster ===
broader_annotation_concerns:
  description: |
    Several other un-annotated or partially-annotated rules in
    the regex grammar may eventually surface similar
    name-loss / span-loss issues for downstream consumers. The
    current report is scoped to `posix_class`; flagging the
    related shapes here so PGEN can decide whether to address
    them in the same slice.
  related_rules:
    - `posix_name` — currently emits the raw name characters
      via `prop_name_chars+` (which is itself un-annotated), so
      consumers walking via `to_json_value()` can recover the
      name via terminal concatenation if the parent rule routed
      through the body. With `posix_class -> $1` truncating, the
      name is unreachable today.
    - `posix_negation` — same situation: the optional `^` is
      reachable in the recursive envelope but lost in the typed
      shape because the annotation drops it.
    - `class_atom`, `class_literal`, `class_escape`,
      `quoted_class_literal`, `class_range` — all currently
      un-annotated. Range endpoints and class items still walk
      via the recursive envelope's array-of-arrays shape; once
      annotated, they should produce typed shapes that preserve
      semantic identity (literal char vs escape vs range vs
      quoted-literal).

impact: |
  ## Direct impact on RGX

  This is a **medium-severity** bug for RGX integration. Every
  pattern containing a POSIX class inside `[...]` fails to
  compile through RGX's adapter with the error:

      pgen AST contract mismatch: unrecognised class_item string: "[:"

  Two regression-pin tests fail today
  (`tests::ucp_pragma_unicodefies_posix_classes` and
  `tests::ucp_graph_includes_format_and_private_use`).

  Once the conformance harness can be re-enabled, the impact
  will widen: POSIX classes appear extensively across the
  PCRE2 `testinput1..29` corpus (testinput1 alone has dozens of
  cases involving `[:alpha:]`, `[:digit:]`, `[:word:]`,
  `[:space:]`, `[:punct:]`, `[:xdigit:]`, etc.). Without this
  fix, every such case will FN at the parser-adapter layer —
  not at the engine layer.

  ## Why it lands as a PGEN issue, not an RGX one

  RGX's `CLAUDE.md` codifies a hard rule: "PGEN is the sole
  parser. No builtin parser fallback." And the
  `feedback_no_pgen_workarounds.md` memory entry says: "If
  PGEN's parser is wrong (wrong AST / rejects valid / accepts
  invalid), file a PGEN report per the cluster-first protocol;
  never add RGX adapter code to absorb malformed output."

  An RGX-side workaround that scanned the source pattern to
  recover POSIX class names would (a) violate that rule, (b)
  duplicate logic PGEN already does internally (the `posix_name`
  rule), (c) require a synthetic span-tracking pass through the
  typed shape, and (d) become dead code once PGEN ships the
  fix. So we report upstream and wait.

  ## Severity assessment

  **Medium** — affects a well-defined class of patterns (POSIX
  classes inside `[...]`). The bug surface is narrow and the
  fix is local to one annotation in `regex.ebnf`. The book
  chapter already sketches the target shape, suggesting this
  is on PGEN's known roadmap (task #40, atom-subtree
  annotation slice).

  ## Comparison with PGEN-RGX-0075

  - 0075 was **critical** (silent data loss in concatenation,
    every multi-piece pattern affected).
  - 0076 is **medium** (loud failure for one specific atom type;
    parser still surfaces the truncated shape rather than dropping
    pieces silently).
  - Both fixes are local to `rust/src/ast_pipeline/...` codegen
    or `regex.ebnf` annotation choices.

resolution:
  status: fixed-upstream
  fixed_in_pgen_release: "1.1.37"
  fixed_in_pgen_commit: "e31804f2"
  fixed_in_rgx_commit: null
  verified_at: 2026-05-01T00:00:00Z
  verification_notes: |
    PGEN 1.1.37 (`e31804f2`) "PGEN-RGX-0076: typed posix_class shape +
    BooleanLiteral codegen fix" upgraded the placeholder annotation
    `posix_class -> $1` to the documented typed object construction:
    `posix_class -> {type:"posix_class", name:$3, negated:$2}` with
    `posix_negation -> true`. Surfaced and fixed two latent codegen
    bugs in `rust/src/ast_pipeline/ast_return_transform.rs`
    (`BooleanLiteral` and `NumberLiteral` rule-level scalar paths
    emitting `Terminal(<bool_str>)` instead of `Json(Bool)`/`Json(Number)`).
    Verified via `pgen_posix_class_dump.rs` — all 21 reproducers in the
    family probe now produce typed `{type:"posix_class", name, negated}`
    objects. RGX's regression-pin tests
    `tests::ucp_pragma_unicodefies_posix_classes` and
    `tests::ucp_graph_includes_format_and_private_use` pass after the
    walker update for typed posix_class.
