id: PGEN-RGX-0076
summary: |
  PGEN's `regex` parser at HEAD `71edfae5` produces a typed AST in
  which a `posix_class` atom collapses to **only its opening
  delimiter** — the literal string `"[:"` — losing the POSIX class
  name and any `posix_negation?` marker. The bug is in the rule's
  return annotation:

      posix_class = "[:" posix_negation? posix_name ":]"
      -> $1

  `$1` extracts the FIRST element of the body (the literal `"[:"`
  Terminal), discarding the matched `posix_negation?` slot,
  `posix_name`, and the closing `":]"`. The book chapter
  `subs/pgen/docs/regex_parser_book/src/rules-char-class.md`
  explicitly notes this is a known sub-optimal annotation:

  > Wait — `-> $1` extracts the FIRST element, which is the `"[:"`
  > terminal. That's not very useful for a useful return shape.
  > [...] In practice, the current emit is a Json containing just
  > `"[:"` — a placeholder shape that clearly needs further
  > annotation work. [...] The eventual shape will be
  > `{type: "posix_class", name: <str>, negated: <bool>}`.

  Bug class: **parses but returns the wrong AST/dump** (per
  `PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md` §4). The parse
  succeeds, but downstream consumers cannot recover the POSIX
  class name (or its negation) from the typed shape alone. The
  source-text fallback that the recursive-envelope walker
  previously used (`slice(node)`) is unavailable in the typed
  shape because spans on inner items are not preserved.

  Impact on RGX: every pattern containing a `[:name:]` POSIX
  class inside `[...]` produces an AST whose POSIX class is
  rendered as the literal string `"[:"`. RGX has no way to
  distinguish `[:alpha:]` from `[:digit:]` — both reduce to the
  same typed value. The two RGX-side regression-pin tests
  `tests::ucp_pragma_unicodefies_posix_classes` and
  `tests::ucp_graph_includes_format_and_private_use` fail with
  a contract-mismatch error from RGX's adapter; downstream the
  conformance ratchet would also drop substantially because
  POSIX classes are common across the PCRE2 testdata corpus.

