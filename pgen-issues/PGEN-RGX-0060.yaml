id: PGEN-RGX-0060
summary: |
  PGEN regex parser rejects bare \E inside a character class (without preceding \Q) with "escape is not accepted inside a character class". PCRE2 10.47 accepts — \E outside a quoted region is read as a literal E per pcre2pattern(3). Residual of PGEN-RGX-0057: the 1.1.22 fix covered \Q...\E but not lone \E.
status: closed
opened_at: 2026-04-15T00:00:00Z
first_seen_at: 2026-04-15T00:00:00Z
last_updated_at: 2026-04-16T00:00:00Z

