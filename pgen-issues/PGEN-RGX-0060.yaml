        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0060/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0060/pgen_trace.log
  pattern: "^[\\Eabc]"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` line 3979. Verified against
    testoutput1:6276 which shows `/^[\Eabc]/` matching `a`
    (subject `E ` expects "No match") — so PCRE2 interprets
    `[\Eabc]` as the literal class `[Eabc]`. Residual of
    PGEN-RGX-0057: the 1.1.22 fix added `quoted_class_literal`
    for the `\Q…\E` form but left bare `\E` (without a matching
    opener) still rejected. Affects 4 test cases:
      ^[\Eabc]
      ^[a-\Ec]
      ^[a\E\E-\Ec]
      ^[\E\Qa\E-\Qz\E]+

# === Bug class (per protocol §4) ===
bug_class: should_parse_but_fails

expected_behavior: |
  PGEN should accept a lone `\E` inside a character class
  (i.e. `\E` that is NOT preceded by an open `\Q` in the same
  class scope) and treat it as a literal `E`, matching PCRE2's
  pcre2pattern(3) rule: "If `\E` is encountered without a
  preceding `\Q`, it is ignored" — inside a class it still
  contributes the letter `E`.

  Suggested grammar amendment in `subs/pgen/grammars/regex.ebnf`
  (augmenting the 1.1.22 `quoted_class_literal` change):

      class_escape = ... | stray_E_literal
      stray_E_literal = "\E"

  Alternatively, lift `\E` into the `class_literal_char`
  production directly as a second form that yields the letter
  `E`.

actual_behavior: |
  PGEN rejects the pattern with:
        regex compile error: E_PARSE_FAILURE: escape is not accepted inside a character class by the regex compile contract
        ^[\Eabc]
          ^

  Note the rejection is at the position of the lone `\E`, not
  at any `\Q`. The 1.1.22 `quoted_class_literal` production only
  matches the paired `\Q…\E` shape.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0060/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0060/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0060/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  4 test cases on testinput1 (each with 1–2 subjects =
  ~7 case-level failures). Small cluster, but a direct sibling
  of the 1.1.22 `\Q…\E`-in-class fix — handling it restores
  PCRE2 10.47's full "\Q and \E inside character classes"
  semantics.

resolution:
  status: verified-fixed-upstream
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.23"
  fixed_in_parser_backend_version: "cd0f8c7"
  verified_at: 2026-04-16T00:00:00Z
  verification_notes: |
    PGEN 1.1.23 added `stray_class_end_quote = "\E"` as a
    dedicated class_item alternative, modelled as a zero-width
    item (it contributes no characters to the class), exactly
    matching PCRE2's rule that `\E` outside a `\Q` region is
    ignored. The grammar also added `empty_quoted_class_literal`
    for the `\Q\E` paired form, and relaxed `class_range` to
    admit `class_zero_width*` around the range dash so forms
    like `[a-\Ec]` no longer trip parsing.

    Verified against the updated submodule:
      cargo run -p rgx-core --bin file_pgen_issues --features pgen-parser \
        -- --ast-dump-only '^[\Eabc]' /tmp/verify.json
    emits `"status": "success"`.

    RGX adapter updated in `rgx-core/src/parsing.rs`:
    - `convert_class_item` new branch skipping
      `stray_class_end_quote` / `empty_quoted_class_literal`
      (they contribute zero ranges)
    - `convert_class_range` rewritten to collect first + last
      class_atom descendants (robust to the new
      `class_atom class_zero_width* "-" class_zero_width* class_atom`
      shape)
    - `convert_class_escape` + `convert_escape` extended to accept
      `class_range_escape` / `class_range_simple_escape` (the
      restricted-endpoint variants introduced in 1.1.23)

    Same commit that closes this report also closes 0058 and 0059.
