id: PGEN-RGX-0009
summary: |
  code_block_lang ws? rule consumes the first byte of the code body, causing code_content span to start 1 byte late
status: open
opened_at: 2026-04-06T00:28:33Z
first_seen_at: 2026-04-06T00:28:33Z
last_updated_at: 2026-04-06T00:28:33Z
