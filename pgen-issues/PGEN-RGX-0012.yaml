id: PGEN-RGX-0012
summary: |
  Multibyte UTF-8 literal characters stop the parser — pattern 'café' parses 'caf' then rejects at the 'é' (position 3)
status: open
opened_at: 2026-04-07T12:55:54Z
first_seen_at: 2026-04-07T12:55:54Z
last_updated_at: 2026-04-07T12:55:54Z
