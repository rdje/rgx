impact: |
  Class: "parses but returns the wrong AST/dump" — same class as
  PGEN-RGX-0006 and PGEN-RGX-0079.

  RGX-specific impact:
    - PCRE2 conformance regression: testinput1:6679 (`/a{ 1 , 2 }/`)
      currently flagged in the false-negative bucket.
    - Any user-supplied pattern containing whitespace inside a
      counted quantifier (not at the outer boundaries) compiles to a
      literal sequence instead of being interpreted as a quantifier.

  Workaround on the RGX side: detect the "literal `{`, digit, comma,
  digit, `}` chain with whitespace pieces" shape in the adapter and
  rewrite it as a quantifier. This is a workaround, not a fix, and
  is rejected by the project's no-PGEN-workarounds rule (see
  `feedback_no_pgen_workarounds.md`). Filed here per that policy.

