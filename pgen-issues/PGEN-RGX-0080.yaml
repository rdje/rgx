id: PGEN-RGX-0080
summary: |
  Counted quantifier `{m,n}` accepts whitespace at the outer boundaries (`a{ 1,2 }`) but rejects it between the digits and the comma (`a{ 1 , 2 }`, `a{1 ,2}`, `a{1, 2}`). PCRE2 allows whitespace anywhere inside `{...}` in default mode (not just under `/x` extended). When PGEN can't fit the inner-whitespace shape into the quantifier rule, it backtracks to a literal `{`, separate digit pieces, comma, etc., producing a structurally-wrong but successful parse.
