    pgen_contract.json                       - parser_embedding_api_contract()
    pgen_ast_dump.json                       - probe AST dump for the bug pattern
    pgen_trace.log                           - PGEN_TRACE_VERBOSITY=debug trace
    pgen_parse_outcome_*.json                - 5-pattern parse outcomes
    pgen_ast_dump_*.json                     - 5-pattern AST dumps

  Helper at: rgx-core/examples/dump_quant_ws_artifacts.rs
