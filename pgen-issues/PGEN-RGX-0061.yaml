          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0061/pgen_trace.log
  pattern: "ab\\Cde"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`). testinput21:78
    shows `/ab\Cde/never_backslash_c` testing the
    `never_backslash_c` modifier (which disables `\C`), and
    testoutput21:82 shows `/ab\Cde/info` succeeding with
    `Contains \C` in its info dump — confirming PCRE2 10.47
    accepts `\C` by default as a "match single code unit" escape
    (pcre2pattern(3) §"Generic character types").

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  PGEN should emit a dedicated AST node for `\C` (e.g.
  `single_byte_escape = "\\" "C"`) rather than routing it through
  the generic `simple_escape(C)` production. The PCRE2 semantics
  are specific: `\C` matches exactly one code unit of the subject,
  irrespective of UTF encoding — it has no counterpart among the
  other simple escapes.

  Suggested grammar amendment in
  `subs/pgen/grammars/regex.ebnf`:

      escape_unit = ... | single_byte_escape | ...
      single_byte_escape = "C"

  (Placing it BEFORE `simple_escape` in the alternation so the
  specific production wins.)

actual_behavior: |
  PGEN parses `\C` as `simple_escape` with trailing character
  'C', same as it does for any unknown alphabetic escape.
  RGX's adapter then rejects at the contract guard:
        regex compile error: pgen AST contract mismatch: unrecognized simple_escape character 'C'

  PGEN's `parse_outcome` reports `"status": "success"` with no
  diagnostic — the error is downstream of PGEN but the
  disambiguation of `\C` from other alphabetic escapes is a
  PGEN-grammar responsibility.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0061/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0061/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0061/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  Small direct cluster (~2 patterns in the current harness
  failure set — `ab\Cde` and `(?<=ab\Cde)X`). However, the
  fix is mechanically tiny (one grammar line) and unlocks a
  PCRE2 primitive that's documented in pcre2pattern(3); once
  PGEN emits a dedicated node RGX can implement the
  "one code unit" match directly in the VM (char or byte
  according to subject-encoding mode).

