id: PGEN-RGX-0061
summary: |
  PGEN regex parser lowers PCRE2 single-byte escape \C to generic simple_escape(C) instead of producing a dedicated byte-atom AST node. PCRE2 10.47 accepts \C by default (PCRE2_NEVER_BACKSLASH_C/never_backslash_c modifier is required to disable it, per testinput21).
