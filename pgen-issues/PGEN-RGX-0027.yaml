id: PGEN-RGX-0027
summary: |
  PGEN regex parser produces an AST node shape RGX's adapter does not recognize for pattern "^[:a[:digit:]]+".
status: open
opened_at: 2026-04-13T00:00:00Z
first_seen_at: 2026-04-13T00:00:00Z
last_updated_at: 2026-04-13T00:00:00Z

# === Parser identity (per PGEN_PARSER_ISSUE_REPORTING_PROTOCOL.md §1) ===
parser_backend: pgen
parser_backend_version: "8783757"
parser_release_version: "1.1.10"
integration_contract_version: "1.1.10"
parser_family: regex
profile: regex_default
integration_surface: parseability_probe
generated_artifact: "PGEN submodule subs/pgen, embedded via rgx-core/src/parsing.rs"

# === Host project identity (per protocol §2) ===
host_project: rgx
rgx_commit: a08179a
host_os: macos
host_arch: aarch64
rust_toolchain: "rustc per workspace rust-version = 1.88"
cargo_features: "default + pgen-parser"

upstream_report:
  reported: false
  issue_id: null
  issue_url: null
  reported_at: null

context:
  feature_flag: pgen-parser
  parser_entrypoint: rgx-core/src/parsing.rs
  command: |
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0027/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0027/pgen_trace.log
  pattern: "^[:a[:digit:]]+"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` block #815 starting
    near input line 4289. PCRE2 10.47 accepts and matches
    this pattern in its own pcre2test harness; PGEN's regex
    grammar diverges as recorded under `actual_behavior`.

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  PGEN should emit an AST whose node shapes match the documented `class_item` (or analogous) contract that the RGX adapter walks. The current output triggers RGX's contract guard at compile time.

actual_behavior: |
  RGX `Regex::compile("^[:a[:digit:]]+")` returns:
        regex compile error: pgen AST contract mismatch: pgen class_item has no known variant under 'class_item'

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0027/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0027/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0027/pgen_trace.log

  Expected: parseability_probe accepts the input (`parse_full passed`).
  Actual: PGEN rejects with the diagnostic recorded in
  `pgen_parse_outcome.json` (or, for contract mismatches, RGX's
  compile error captured in `actual_behavior`).

impact: |
  One of many PGEN-related failures uncovered by RGX's
  PCRE2 10.47 testinput1 conformance harness. Each failing pattern
  also blocks RGX from passing the corresponding pcre2test case.
  Aggregate impact is tracked in `docs/BACKLOG.md` C7.

resolution:
  status: fixed-upstream-pending-adapter
  fixed_in_rgx_commit: null
  fixed_in_parser_release_version: "1.1.19"
  fixed_in_parser_backend_version: "edd3b59"
  verified_at: 2026-04-14T00:00:00Z
  verification_notes: |
    PGEN 1.1.19 (commit edd3b59) now parses the repro input —
    the input no longer fails at PGEN. The remaining failure is
    RGX-side: PGEN emits an AST node of category "class_item variant (POSIX class inside brackets)"
    that RGX's adapter in rgx-core/src/parsing.rs does not yet
    lower. Observed RGX-side error:
      pgen AST contract mismatch: pgen class_item has no known variant under 'class_item'
    Tracked as RGX-side follow-up in docs/BACKLOG.md C7 under
    "RGX adapter gaps opened by PGEN 1.1.19 upstream fixes".
