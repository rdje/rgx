  verification_notes: |
    Verification path (mirrors PGEN-RGX-0084's, for the new sub-family):
      1. Bump `subs/pgen` to a release whose `\NN` disambiguation also
         rejects the `[89]`-leading multi-digit escape (`\8N`/`\9N`,
         value >= 10, insufficient groups) as a clean parse error,
         matching PCRE2.
      2. Confirm `pgen::embedding_api::parse_grammar_profile_named(
         "regex","regex_default","((((((((x))))))))\\81")` returns
         `Err(ParseDiagnostic)` (not Ok-with-`\8`-backref).
      3. Re-run `cargo test -p rgx-core --test pcre2_conformance --
         --ignored --nocapture`; confirm testinput2:4671 and :4674
         close and the ratchet ticks back up (+2 / -2): restore
         PASS_BASELINE/FAIL_BASELINE toward 12,807 / 3 (3910 stays
         closed from 0084) in the same commit, and drop this report's
         line from the rebaseline justification.
      4. PGEN-RGX-0084 stays CLOSED throughout (its `\10` case is and
         remains fixed); only 0087 transitions to resolved.
