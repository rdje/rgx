id: PGEN-RGX-0087
summary: |
  Same PARENT FAMILY as PGEN-RGX-0084 (multi-digit `\NN` octal-vs-
  backreference disambiguation at parse time), but a DISTINCT defect.

  **PGEN-RGX-0084 itself is FIXED and CLOSED** — PGEN release 1.1.76
  (commit b5036c4e) correctly disambiguates `\NN` by capturing-groups-
  opened-up-to-that-position (the originally-reported `\10` forward-
  reference case, conformance `testinput1:3910`, is verified closed on
  the adopted pin 65b845f0).

  PGEN-RGX-0087 is the residual the 0084 fix did **not** extend to: the
  `[89]`-leading multi-digit escape sub-family `\8N` / `\9N`. For these,
  the digits `8` and `9` are not octal digits, so the octal fallback is
  unavailable; PCRE2 therefore **rejects the pattern at compile** rather
  than degrading. PGEN's post-0084 PEG fallback chain instead backtracks
  to `numeric_backreference_single = /([1-9])/`, matching the single
  leading digit `8`/`9` as a numeric backreference and leaving the
  trailing digit(s) as literal pieces. Downstream consumers (RGX) that
  faithfully lower PGEN's AST then ACCEPT a pattern PCRE2 rejects.
