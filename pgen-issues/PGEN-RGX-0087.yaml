  notes: |
    Surfaces as the two new "RGX too permissive" PCRE2 conformance
    failures introduced by adopting the combined pin 65b845f0:
    testinput2:4671 (`\81`) and testinput2:4674 (`\80`). RGX's PCRE2
    differential ratchet moved 12,806 pass / 4 fail (old pin
    08593d05) -> 12,805 pass / 5 fail (adopted pin 65b845f0): net
    -1 (+1 from PGEN-RGX-0084's `\10` case closing, -2 from this
    sub-family). RGX deliberately rebaselined the ratchet to
    12,805 / 5 with this report as the explicit justification (the
    conformance harness's sanctioned "intentional + justified +
    explain in commit" path); no RGX-side workaround
    (feedback_no_pgen_workarounds / feedback_family_fix_doctrine).
expected_behavior: |
  PCRE2 `pcre2pattern(3)` BACKREFERENCES + the "octal escapes" rules:
  a backslash followed by digits is the longest digit run; if it is an
  integer N with at least N capturing groups *up to that point* it is a
  back reference; otherwise the digits are taken as an octal value *if
  they qualify* (one digit 0-7, two digits up to 0o77, or three octal
  digits). The digits `8` and `9` are NOT octal. So for `\8N` / `\9N`
  where the full value is >= 10 and there are not that many groups:
  it is neither a valid full back reference nor a valid octal escape,
  and PCRE2 **rejects the pattern at compile** (empirically confirmed
  by the differential harness: PCRE2 errors on
  `/((((((((x))))))))\81/`). PGEN should likewise reject (surface a
  clean `ParseDiagnostic`, e.g. `E_PARSE_FAILURE`) for the
  `[89]`-leading multi-digit escape rather than re-splitting it into a
  single-digit backreference plus literal digit(s).
actual_behavior: |
  PGEN release 1.1.77 (pin 65b845f0) parse of `((((((((x))))))))\81`
  SUCCEEDS, emitting (see artifacts/PGEN-RGX-0087/pgen_ast_dump_81.json):

      ... 8 nested {"kind":"capturing_group","type":"atom"} ...
      {"atom":{"index":8,"kind":"numeric","type":"backreference"},...}
      {"atom":"1","type":"piece"}                       # literal '1'

  i.e. `\8` -> numeric backreference index 8, `1` -> literal. The
  post-0084 EBNF:

      backreference = numeric_backreference        -> $1   # N>=10, GATED by
                                                           # @predicate fact_count_at_least(regex_capture_group,$index)
                    | numeric_backreference_single -> $1   # N 1-9, UNGATED
      backreference_digits        = /([1-9][0-9]+)/
      backreference_digits_single = /([1-9])/

  For `\81` with 8 groups the gated multi-digit branch fails
  (8 < 81) and the PEG backtracks to `numeric_backreference_single`,
  which matches the lone `8`. The grammar has no rule that the
  `[89]`-leading multi-digit escape, when not a valid full backref,
  is a hard error (PCRE2's behavior) rather than a degrade.
reproducer_probe: |
  RGX direct probe on pin 65b845f0 (RGX has zero `\NN` special-casing
  — it faithfully lowers PGEN's atoms; so this is PGEN-side):
    ((((((((x))))))))\81   -> RGX ACCEPT   (PCRE2 rejects)   [4671]
    ((((((((x))))))))\82   -> RGX ACCEPT   (PCRE2 rejects)
    ((((((((x))))))))\91   -> RGX REJECT   (\9 = backref to missing group 9; only 8 groups)
    (((((((((x)))))))))\10 -> RGX ACCEPT   (valid post-0084 octal-digit path; correct)
    (x)\81 / \8 / \80      -> RGX REJECT   (\8 = backref to missing group)
  The divergence is specifically: enough groups exist that `\8`/`\9`
  resolves as a *valid* single-digit backref, so PGEN's split yields
  an accepted pattern where PCRE2 rejects the construct.
rgx_side_manifestations: |
  Beyond the two conformance cases (testinput2:4671/:4674), the
  PGEN-0087 re-split also breaks a pre-existing RGX unit test that
  asserts the *correct* PCRE2 behaviour:
  `rgx-core/src/lib.rs::tests::parser_multi_digit_non_octal_backref_becomes_literal`
  (`\89` → literal "89"; `\199` → \x01 + "99"). Post-0084 PGEN
  re-splits `\89` into single-digit backref `\8` + literal `9`, so
  `Regex::compile(r"\89")` errors instead of compiling the literal.
  RGX `#[ignore]`d that test with an explicit PGEN-RGX-0087 reason
  (NOT deleted, NOT expectation-corrupted) — re-enable on the PGEN
  fix. Single-digit (`\2`) and 9-digit-octal-triplet sibling tests
  are unaffected (0084 left single-digit handling unchanged).

