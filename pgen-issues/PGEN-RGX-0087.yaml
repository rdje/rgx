  pgen_release: "1.1.80"            # contract 1.1.82
  pgen_commit: 5fd20609a8a2e4daecfe491f6975d599931bda72
  ledger: "PGEN-RGX-0087-FIX2 (.1 class scope, .2 lockstep, .3 octal >\\377 overflow); PGEN-RGX-0087 CLOSED upstream"
  outcome: RESOLVED — PGEN-RGX-0087 is CLOSED.
  what_landed: |
    FIX2.1+.2 (rel 1.1.79): scoped the `[89]`-leading multi-digit
    hard-reject to NON-character-class context — fixes the rel-1.1.78
    over-rejection recorded in fix_attempt_1. FIX2.3 (rel 1.1.80):
    added the bare-octal `>\377` overflow reject.
  rgx_verification_on_pin_5fd20609: |
    Probe (RGX has zero \NN special-casing — faithfully lowers PGEN):
      `((((((((x))))))))\81` `\89` `\80`        -> REJECT  (= PCRE2; original 0087 CLOSED)
      `[\8]` `[\9]` `^[A\8B\9C]+$` `[\88]`        -> ACCEPT  (= PCRE2; rel-1.1.78 over-reject FIXED)
      `\199`                                     -> ACCEPT, matches \x01+"99" (= PCRE2 octal)
      `(((((((((x)))))))))\10` `\377` `[\377]` `\012` -> ACCEPT (byte-identical)
      `((((((((x))))))))\8`                       -> ACCEPT backref (RGX-0084 Non-Goal, unchanged)
    PCRE2 differential conformance: testinput2:4671 (`\81`) and
    :4674 (`\80`) — the two originally-reported PGEN-RGX-0087
    cases — are CLOSED (absent from the failure set). Ratchet
    12,805 / 5 (prior pin 65b845f0) -> 12,806 / 4 (pin 5fd20609):
    NET IMPROVEMENT (+1 pass / -1 fail).
  residual_is_a_new_distinct_report_not_a_reopen: |
    FIX2.3's `>\377` overflow reject is grammar-only and
    UNCONDITIONAL, so it over-rejects octal escapes valid under UTF
    mode (e.g. `/\777/I,utf` = U+01FF — PCRE2 accepts). That is the
    sole new failure on this pin (testinput10:218) and is a NEW,
    DISTINCT defect (UTF-mode octal range, not the `[89]`-leading
    backref family) → filed as **PGEN-RGX-0088**. PGEN-RGX-0087
    stays CLOSED; 0088 owns the residual.
  rgx_adoption: |
    RGX ADOPTS pin 5fd20609 (net improvement; the differential
    harness flagged "NEW BASELINE ELIGIBLE — lock in the
    improvement"). pcre2_conformance.rs rebaselined 12,805/5 ->
    12,806/4. Unit test `parser_multi_digit_non_octal_backref_
    becomes_literal` rewritten PCRE2-faithful (`\89` rejects;
    `\199` -> \x01+"99") and un-`#[ignore]`d.
