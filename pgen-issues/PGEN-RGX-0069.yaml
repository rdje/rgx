  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` block #0 starting
    near input line 6841. PCRE2 10.47 *rejects* this pattern at compile time; PGEN accepts it. See `expected_behavior` / `actual_behavior` for the exact rule.

# === Bug class (per protocol §4) ===
bug_class: should_fail_but_parses

expected_behavior: |
  PGEN should reject a `class_range` production whose `class_atom` endpoint resolves to a shorthand class (`\d`, `\D`, `\h`, `\H`, `\s`, `\S`, `\w`, `\W`) or a Unicode-property escape (`\p{...}`, `\P{...}`). Per PCRE2 10.47 these atoms cannot be range endpoints; PCRE2 issues a "Failed: error 150 at offset N: invalid range in character class" diagnostic. The expected PGEN behaviour is a structurally-equivalent parse failure emitted at grammar time, OR (less preferred) a post-parse validator that rejects the case before the AST surfaces to downstream adapters.

actual_behavior: |
  PGEN accepts `[\d-x]` and emits a `class_range` node whose `start` endpoint resolves to a shorthand (`class_escape(\d)`) rather than a single character. RGX's adapter encounters this shape in `extend_class_ranges_from_regex` and raises "pgen AST contract mismatch: pgen class_range endpoint must resolve to a single character", which surfaces to the user as an internal-looking RGX compile error rather than PCRE2's cleaner diagnostic. Affects ~24 cases in the "compile: PGEN AST contract mismatch" bucket of the PCRE2 conformance harness.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0069/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0069/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0069/pgen_trace.log

  Expected: parseability_probe rejects the input with a `\N is not allowed in a character class`-style diagnostic (or the analogous PCRE2 reason for this cluster).
  Actual: PGEN accepts the pattern; `pgen_parse_outcome.json` records `status: success` with no diagnostic. RGX then compiles the (PCRE2-incompatible) AST and matches against subjects PCRE2 would refuse.

impact: |
  One of many PGEN-related failures uncovered by RGX's
  PCRE2 10.47 testinput1 conformance harness. Each failing pattern
  also blocks RGX from passing the corresponding pcre2test case.
  Aggregate impact is tracked in `docs/BACKLOG.md` C7.

resolution:
  status: fixed-upstream
  fixed_in_rgx_commit: null
  verified_at: null
  verification_notes: |
    PGEN 1.1.27 (8ed45af) removed `property_escape` from `class_range_escape_unit` and tightened `class_range_literal_escape_letter`; PGEN 1.1.28 (baac0b1) retained those changes. RGX submodule pinned at 1.1.28; `[\d-x]` shorthand/property endpoints now rejected at parse.
