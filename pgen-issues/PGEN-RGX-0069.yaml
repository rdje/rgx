id: PGEN-RGX-0069
summary: |
  PGEN emits a `class_range` whose start endpoint is a shorthand class (`\d`) — PCRE2 10.47 rejects such patterns at compile time with "invalid range in character class". pcre2pattern(3) §"Character classes" states that class ranges must be bounded by character literals; `\d`, `\D`, `\h`, `\H`, `\s`, `\S`, `\w`, `\W`, `\p{...}`, `\P{...}` are not valid range endpoints. PGEN currently accepts these and emits a malformed `class_range` AST node.
status: closed
opened_at: 2026-04-17T11:50:55Z
first_seen_at: 2026-04-17T11:50:55Z
last_updated_at: 2026-04-17T11:50:55Z

