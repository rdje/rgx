id: PGEN-RGX-0068
summary: |
  PGEN does not form a `class_range` across `\Q...\E` quoted-literal endpoints — `[\Qa\E-\Qz\E]` is parsed as three independent class items ['a', '-', 'z'] instead of the range [a-z]. PCRE2 10.47 treats the literal characters produced by `\Q...\E` as valid class-range endpoints, so `[\Qa\E-\Qz\E]` is equivalent to `[a-z]` and the dash between them is the range operator, not a literal.
