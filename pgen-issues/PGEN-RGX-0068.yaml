  pattern: "^[\\Qa\\E-\\Qz\\E]+"
  source: |
    Discovered by the RGX PCRE2 conformance harness
    (`rgx-core/tests/pcre2_conformance.rs`) while scanning
    `subs/pcre2/testdata/testinput1` block #0 starting
    near input line 3996. PCRE2 10.47 parses AND matches this pattern; PGEN parses but emits an AST whose semantics diverge from PCRE2. See `actual_behavior` for the divergence and `pgen_ast_dump.json` for PGEN's emitted shape.

# === Bug class (per protocol §4) ===
bug_class: parses_but_returns_wrong_ast

expected_behavior: |
  PGEN should allow `quoted_class_literal` nodes that expose a single-character literal to serve as `class_range` endpoints, producing a single `class_range` AST node from `\Qa\E-\Qz\E` equivalent to what PGEN emits for the bare form `a-z`. Verified against PCRE2 10.47 via `subs/pcre2/testdata/testoutput1:3996` (or the corresponding output line) where the pattern is treated as `[a-z]` and "-" is *not* in the class.

actual_behavior: |
  PGEN emits three separate `class_item` children inside the class — a `quoted_class_literal` with body "a", a literal-dash `class_item`, and a `quoted_class_literal` with body "z". RGX's adapter therefore builds `Regex::CharClass(Custom { ranges: [CharRange(a), CharRange(-), CharRange(z)], negated: false })` — the dash is a class member instead of the range operator. Affects part of the 457-case "false positive" bucket in the PCRE2 conformance harness: patterns that should match only a-z letters instead match literal dashes.

reproduction: |
  Reproducer artifacts under pgen-issues/artifacts/PGEN-RGX-0068/:
    - repro_input.txt — exact failing input (one line, no trailing newline)
    - pgen_contract.json — captured `parser_embedding_api_contract()` JSON
    - pgen_parse_outcome.json — captured `parse_grammar_profile_named` JSON

  Reproduction command (from rgx repo root) — captures the trace:
    cd subs/pgen && PGEN_TRACE_VERBOSITY=debug \
        cargo run --manifest-path rust/Cargo.toml --features generated_parsers \
          --bin parseability_probe -- --parse regex \
          ../../pgen-issues/artifacts/PGEN-RGX-0068/repro_input.txt \
          --profile regex_default --trace \
          --trace-log-file ../../pgen-issues/artifacts/PGEN-RGX-0068/pgen_trace.log

  Expected: parseability_probe accepts the input and emits an AST whose shape matches PCRE2's documented matching behaviour for this construct.
  Actual: PGEN accepts the input but emits an AST whose shape diverges from PCRE2; see `pgen_ast_dump.json` and `actual_behavior`.

