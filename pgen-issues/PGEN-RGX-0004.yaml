expected_behavior: |
  The regex pattern ab+ should parse as the concatenation of:
  - literal "a"
  - quantified literal "b+"

  In other words, the trailing "+" should bind only to the final literal character, not to the whole "ab" prefix.
actual_behavior: |
  The generated regex backend accepts ab+ successfully, but the AST dump emits a single piece spanning bytes 0..3 where:
  - the atom is a literal spanning bytes 0..2 and covering both "a" and "b",
  - and the separate quantifier node at bytes 2..3 applies to that whole piece.

  That accepted tree groups the pattern as though the trailing "+" were attached to the full "ab" atom, not just to "b".
reproduction: |
  Exact tracked reproducer bundle:
  - pgen-issues/artifacts/PGEN-RGX-0004/repro_input.txt
  - pgen-issues/artifacts/PGEN-RGX-0004/pgen_contract.json
  - pgen-issues/artifacts/PGEN-RGX-0004/pgen_parse_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0004/pgen_ast_dump_outcome.json
  - pgen-issues/artifacts/PGEN-RGX-0004/pgen_ast_dump.json
  - pgen-issues/artifacts/PGEN-RGX-0004/pgen_trace.log

  Key facts from the bundle:
  - pgen_contract.json reports supports_regex_generated_backend=true, regex_parser_release_version=1.1.0, and regex_integration_contract_version=1.1.0.
  - pgen_parse_outcome.json reports status=success with no diagnostic.
  - pgen_ast_dump.json emits one piece spanning start=0, end=3.
  - Inside that piece, the literal node spans start=0, end=2 and covers both literal chars "a" and "b".
  - The quantifier node spans start=2, end=3 and therefore binds to the whole preceding piece.

  A downstream that consumes the published accepted-tree grouping cannot reconstruct a(b+) from this tree; the grouping has already committed to (ab)+-style binding.
impact: |
  RGX cannot safely reconstruct quantifier semantics for patterns where a trailing quantifier follows a multi-character literal run.

  More generally, this changes regex meaning in the accepted tree, so downstream semantic consumers would parse ab+ as a different language than the source pattern intended.
resolution:
  status: verified-fixed-upstream
